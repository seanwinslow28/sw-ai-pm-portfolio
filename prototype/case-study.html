<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sean Winslow — Case-study v1 prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --paper: #fff9f0;
      --ink: #1a1a1e;
      --teal: #0a3e42;
      --teal-success: #0f6e56;
      --secondary: #546e71;
      --stamp: #7c2d12;
      --amber: #fac775;
      --border: rgba(10, 62, 66, 0.15);
      --anno: rgba(10, 62, 66, 0.7);
      --strike: rgba(124, 45, 18, 0.8);
      --margin-rule: rgba(10, 62, 66, 0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body { cursor: none; }
    @media (prefers-reduced-motion: reduce) { body { cursor: auto; } }
    @media (hover: none) { body { cursor: auto; } }

    /* ===== Page shell ===== */
    .page {
      position: relative;
      background: var(--paper);
      padding: 60px 52px 80px;
      overflow: hidden;
    }
    .page__inner {
      max-width: 1120px;
      margin: 0 auto;
      position: relative;
    }

    /* Right margin accent rule (desktop only) */
    .page__inner::after {
      content: "";
      position: absolute;
      top: 0;
      right: -32px;
      bottom: 0;
      width: 1px;
      background: var(--margin-rule);
      pointer-events: none;
    }
    @media (max-width: 1024px) { .page__inner::after { display: none; } }

    .page--archived .page__inner::after { opacity: 0.5; }

    /* Torn paper edges */
    .torn-top, .torn-bottom {
      position: absolute;
      left: 0;
      right: 0;
      width: 100%;
      height: 32px;
      pointer-events: none;
      z-index: 1;
    }
    .torn-top    { top: -16px; }
    .torn-bottom { bottom: -16px; transform: scaleY(-1); }

    /* ===== Dateline ===== */
    .dateline { margin-bottom: 24px; }
    .dateline__line {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      line-height: 1.5;
    }
    .dateline__stamp { color: var(--stamp); font-weight: 500; }
    .dateline__body  { color: var(--secondary); }
    .dateline__rule {
      height: 0.5px;
      background: var(--border);
      margin-top: 12px;
    }

    /* ===== Role / in-flight chrome ===== */
    .chrome {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }
    .chrome__role {
      color: var(--stamp);
      font-weight: 500;
    }
    .chrome__range {
      color: var(--secondary);
    }

    /* ===== Title block ===== */
    .title-block {
      position: relative;
      margin-bottom: 48px;
    }
    .title-block__top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .frame {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 1.6px;
      font-weight: 500;
      color: var(--amber);
    }
    .pill-status {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid currentColor;
      line-height: 1.2;
    }
    .pill-status--active   { color: var(--stamp); }
    .pill-status--shipped  { color: var(--teal-success); }
    .pill-status--paused   { color: var(--secondary); }
    .pill-status--archived { color: var(--secondary); opacity: 0.7; }
    .pill-status--coming   { color: var(--stamp); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

    .case-title {
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(48px, 5.6vw, 84px);
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -0.6px;
      color: var(--teal);
      margin: 0 0 16px;
      max-width: 920px;
    }
    .case-title--desat { color: var(--secondary); }

    .title-block__bottom {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 32px;
      flex-wrap: wrap;
    }
    .tags {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--secondary);
    }
    .anchor {
      font-family: "JetBrains Mono", monospace;
      font-size: 18px;
      letter-spacing: 0.8px;
      font-weight: 500;
      color: var(--teal);
    }
    .anchor::before { content: "◐ "; color: var(--amber); }

    /* SHIPPED stamp on title block */
    .shipped-stamp {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 6px 14px;
      border: 2px solid var(--stamp);
      color: var(--stamp);
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 3px;
      font-weight: 500;
      text-transform: uppercase;
      transform: rotate(-3deg);
      opacity: 0.85;
      pointer-events: none;
    }
    .shipped-stamp__sub {
      display: block;
      font-size: 9px;
      letter-spacing: 1.4px;
      margin-top: 2px;
      opacity: 0.7;
    }

    /* ===== Hero media ===== */
    .hero-media {
      max-width: 1120px;
      margin: 0 auto 64px;
      aspect-ratio: 16/9;
      background: rgba(10, 62, 66, 0.06);
      border: 0.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hero-media video,
    .hero-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== ShippedNow live block (SHIPPED only) ===== */
    .shipped-now {
      margin: 0 0 48px;
      padding: 18px 22px;
      background: rgba(15, 110, 86, 0.06);
      border-left: 3px solid var(--teal-success);
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.8px;
      line-height: 1.55;
      color: var(--secondary);
    }
    .shipped-now__prefix {
      color: var(--teal-success);
      font-weight: 500;
      letter-spacing: 1.6px;
      margin-right: 8px;
    }
    .shipped-now__dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal-success);
      margin-right: 6px;
      vertical-align: middle;
      animation: livePulse 1.8s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.35; transform: scale(0.75); }
    }
    .shipped-now__updated {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: 1.2px;
      color: var(--secondary);
      opacity: 0.7;
    }

    /* ===== Return condition callout (PAUSED only) ===== */
    .return-condition {
      margin: 0 0 48px;
      padding: 20px 22px;
      border: 0.5px solid var(--secondary);
      background: rgba(84, 110, 113, 0.04);
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.8px;
      line-height: 1.6;
      color: var(--secondary);
      max-width: 760px;
    }
    .return-condition__heading {
      color: var(--secondary);
      font-weight: 500;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 8px;
    }

    /* ===== Frame-the-work preamble (ARCHIVED only) ===== */
    .preamble {
      margin: 0 0 48px;
      max-width: 760px;
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      font-weight: 300;
      line-height: 1.45;
      color: var(--secondary);
      letter-spacing: -0.1px;
      font-style: italic;
    }

    /* ===== Opener ===== */
    .opener {
      max-width: 680px;
      margin: 0 0 96px;
    }
    .opener p {
      font-family: "Newsreader", Georgia, serif;
      font-size: 24px;
      line-height: 1.45;
      font-weight: 300;
      letter-spacing: -0.2px;
      color: var(--ink);
      margin: 0 0 24px;
    }

    /* ===== Section heading ===== */
    .section { margin-bottom: 96px; position: relative; }
    .section__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 2.4px;
      font-weight: 500;
      text-transform: uppercase;
      color: rgba(10, 62, 66, 0.8);
      margin: 0 0 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section__heading::before,
    .section__heading::after {
      content: "";
      height: 0.5px;
      background: var(--border);
      flex: 1;
    }

    /* ===== Investigation board ===== */
    .investigation {
      display: flex;
      flex-direction: column;
      gap: 56px;
    }
    .artifact {
      display: grid;
      grid-template-columns: minmax(0, 520px) minmax(0, 1fr);
      gap: 48px;
      align-items: start;
      position: relative;
    }

    /* Artifact frame (Polaroid-style) */
    .a-frame {
      position: relative;
      padding: 18px 18px 24px;
      background: #ffffff;
      border: 0.5px solid var(--amber);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
    }
    .a-frame__tape {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 80px;
      height: 18px;
      background: rgba(250, 199, 117, 0.55);
      border: 0.5px solid rgba(250, 199, 117, 0.7);
    }
    .a-frame__body {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      overflow: hidden;
    }

    /* Slack DM artifact */
    .slack {
      width: 100%;
      padding: 18px;
      background: #f6f5f3;
      border: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .slack__msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .slack__avatar {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: var(--teal);
      color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 500;
    }
    .slack__avatar--alt { background: var(--stamp); }
    .slack__bubble {
      flex: 1;
    }
    .slack__author {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--ink);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .slack__time {
      color: var(--secondary);
      margin-left: 6px;
      font-weight: 400;
      font-size: 10px;
    }
    .slack__text {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      color: var(--ink);
    }
    .slack__code {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(10, 62, 66, 0.08);
      border-radius: 3px;
      font-size: 11px;
    }

    /* Metric chart artifact */
    .chart-wrap {
      width: 100%;
      padding: 12px;
      background: #ffffff;
    }
    .chart-wrap text {
      font-family: "JetBrains Mono", monospace;
    }

    /* Board / PRD diff artifact */
    .board {
      width: 100%;
      padding: 18px;
      background: #fcfaf6;
      border: 0.5px solid var(--border);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .board__line { display: block; }
    .board__minus { color: var(--strike); text-decoration: line-through; }
    .board__plus  { color: var(--teal-success); }
    .board__meta  { color: var(--secondary); font-size: 11px; letter-spacing: 1.2px; }

    /* Caption */
    .caption {
      padding-top: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 1.55;
      color: var(--secondary);
    }
    .caption__stamp {
      color: var(--stamp);
      font-weight: 500;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }
    .caption__stamp--killed { color: var(--strike); }

    /* Cut artifact strikethrough */
    .strike-x {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .strike-x svg { width: 100%; height: 100%; }

    /* Pencil annotations */
    .anno-arrow {
      position: absolute;
      pointer-events: none;
      z-index: 3;
    }
    .anno-arrow text {
      font-family: "Caveat", cursive;
      font-size: 18px;
      fill: var(--anno);
    }
    .coffee-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      pointer-events: none;
      opacity: 0.32;
      z-index: 2;
    }

    /* ===== Methods strip ===== */
    .methods-table {
      width: 100%;
      border-collapse: collapse;
      font-family: "JetBrains Mono", monospace;
    }
    .methods-table th, .methods-table td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
      letter-spacing: 0.6px;
      vertical-align: top;
    }
    .methods-table th {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--stamp);
      font-weight: 500;
      text-transform: uppercase;
      padding-bottom: 14px;
    }
    .methods-table td:first-child { color: var(--ink); font-weight: 500; }
    .methods-table td:nth-child(2),
    .methods-table td:nth-child(3) { color: var(--secondary); }
    .methods-table a {
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--teal);
    }
    .methods-table a:hover { background: rgba(10, 62, 66, 0.04); }

    /* ===== 4Q block ===== */
    .fourq { max-width: 760px; }
    .fourq__q {
      margin-bottom: 40px;
    }
    .fourq__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 0 14px;
      display: flex;
      gap: 18px;
      align-items: baseline;
    }
    .fourq__qnum {
      color: var(--amber);
      letter-spacing: 1.6px;
    }
    .fourq__qtitle {
      font-family: "Newsreader", Georgia, serif;
      font-size: 22px;
      letter-spacing: -0.2px;
      font-weight: 400;
      color: var(--teal);
      text-transform: none;
    }
    .fourq__body {
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.1px;
      margin: 0;
    }
    .fourq__body--q1 { font-size: 24px; }
    .fourq__canonical {
      display: inline-block;
      margin-top: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.6px;
      color: var(--teal);
      text-decoration: none;
    }
    .fourq__canonical:hover { text-decoration: underline; }

    /* ===== Next/prev nav ===== */
    .navfold {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding-top: 32px;
      border-top: 0.5px solid var(--border);
    }
    .navfold a {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 1.8px;
      font-weight: 500;
      color: var(--teal);
      text-decoration: none;
      transition: transform 200ms ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .navfold a:hover .navfold__arrow--left  { transform: translateX(-4px); }
    .navfold a:hover .navfold__arrow--right { transform: translateX(4px); }
    .navfold__arrow {
      font-size: 18px;
      transition: transform 200ms ease;
    }

    /* Registration mark */
    .reg-mark {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      opacity: 0.7;
      pointer-events: none;
    }

    /* ===== Status variants preview gallery ===== */
    .gallery-divider {
      max-width: 1120px;
      margin: 80px auto;
      padding: 24px 52px;
      background: var(--ink);
      color: var(--paper);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .gallery-divider span { color: var(--amber); }

    .variant-grid {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 52px 80px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 64px;
    }
    .variant {
      padding: 32px;
      border: 0.5px solid var(--border);
      background: rgba(10, 62, 66, 0.02);
      position: relative;
    }
    .variant__label {
      position: absolute;
      top: -12px;
      left: 24px;
      padding: 4px 12px;
      background: var(--paper);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.8px;
      font-weight: 500;
      color: var(--stamp);
      text-transform: uppercase;
    }
    .variant--archived { opacity: 0.85; }

    /* ===== Custom cursor ===== */
    .cursor {
      position: fixed;
      top: 0; left: 0;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink);
      pointer-events: none;
      z-index: 800;
      mix-blend-mode: difference;
      transition: width 200ms ease, height 200ms ease, background 200ms ease;
      will-change: transform;
    }
    .cursor--link     { width: 36px; height: 36px; background: var(--teal); mix-blend-mode: normal; opacity: 0.85; }
    .cursor--artifact { width: 28px; height: 28px; background: var(--amber); mix-blend-mode: normal; }

    /* ===== Mobile / Tablet ===== */
    @media (max-width: 1024px) {
      .artifact { grid-template-columns: 1fr; gap: 16px; }
      .anno-arrow, .coffee-ring { display: none; }
    }
    @media (max-width: 768px) {
      .page { padding: 40px 24px 60px; }
      .title-block__bottom { flex-direction: column; align-items: flex-start; gap: 8px; }
      .navfold { flex-direction: column; gap: 24px; align-items: stretch; }
      .navfold a:nth-child(2) { text-align: right; }
    }

    @media (prefers-reduced-motion: reduce) {
      .pill-status--coming, .shipped-now__dot, .navfold__arrow {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    const TOKENS = {
      paper:    "#FFF9F0",
      ink:      "#1A1A1E",
      teal:     "#0A3E42",
      amber:    "#FAC775",
      secondary:"#546E71",
      stamp:    "#7C2D12",
      success:  "#0F6E56",
      anno:     "rgba(10,62,66,0.7)",
      strike:   "rgba(124,45,18,0.8)",
      border:   "rgba(10,62,66,0.15)",
    };

    /* ===== Shared components ===== */

    function TornEdge({ variant }) {
      const cls = variant === "top" ? "torn-top" : "torn-bottom";
      return (
        <svg className={cls} viewBox="0 0 1440 32" preserveAspectRatio="none" aria-hidden="true">
          <path
            d="M0,16 Q24,8 48,14 T96,16 T144,12 T192,18 T240,14 T288,20 T336,12 T384,16 T432,10 T480,18 T528,14 T576,20 T624,12 T672,16 T720,8 T768,18 T816,14 T864,20 T912,12 T960,16 T1008,10 T1056,18 T1104,14 T1152,20 T1200,12 T1248,16 T1296,8 T1344,18 T1392,14 T1440,16 L1440,0 L0,0 Z"
            fill={TOKENS.paper}
          />
        </svg>
      );
    }

    function Dateline({ stamp, body }) {
      return (
        <div className="dateline">
          <div className="dateline__line">
            <span className="dateline__stamp">{stamp}</span>
            <span className="dateline__body">{body}</span>
          </div>
          <div className="dateline__rule" />
        </div>
      );
    }

    function Chrome({ role, range }) {
      return (
        <div className="chrome">
          <span className="chrome__role">ROLE — {role}</span>
          <span className="chrome__range">{range}</span>
        </div>
      );
    }

    function PillStatus({ status }) {
      return <span className={`pill-status pill-status--${status.toLowerCase()}`}>{status}</span>;
    }

    function TitleBlock({ frame, status, title, tags, anchor, shippedAt, desat }) {
      return (
        <div className="title-block">
          <div className="title-block__top">
            <span className="frame">{frame} ·</span>
            <PillStatus status={status} />
          </div>
          <h1 className={`case-title ${desat ? "case-title--desat" : ""}`}>{title}</h1>
          <div className="title-block__bottom">

    function MetricChart() {

      const max = 24;
      const w = 360, h = 160, pad = 28;
      const xStep = (w - pad*2) / (v1.length - 1);
      const yFor = (v) => h - pad - (v / max) * (h - pad*2);
      const path = (arr) => arr.map((v,i) => `${i === 0 ? "M" : "L"}${pad + i*xStep},${yFor(v)}`).join(" ");
      return (
        <div className="chart-wrap">
          <svg viewBox={`0 0 ${w} ${h+30}`} width="100%" height="100%" aria-label="Render time per frame v1 to v2a">
            <line x1={pad} y1={h-pad} x2={w-pad} y2={h-pad} stroke={TOKENS.border} strokeWidth="0.5" />
            <line x1={pad} y1={pad}   x2={pad}   y2={h-pad} stroke={TOKENS.border} strokeWidth="0.5" />
            <text x={pad-4} y={yFor(22)+4} textAnchor="end" fontSize="9" fill={TOKENS.secondary}>22s</text>
            <text x={pad-4} y={yFor(4)+4}  textAnchor="end" fontSize="9" fill={TOKENS.secondary}>4s</text>
            <path d={path(v1)}  stroke={TOKENS.secondary} strokeWidth="1.2" fill="none" strokeDasharray="3,3" />
            <path d={path(v2a)} stroke={TOKENS.teal} strokeWidth="1.6" fill="none" />
            {v2a.map((v,i) => <circle key={i} cx={pad + i*xStep} cy={yFor(v)} r="2.4" fill={TOKENS.teal} />)}
            <text x={w-pad-6} y={yFor(v1[v1.length-1])-6} textAnchor="end" fontSize="9" fill={TOKENS.secondary}>v1 (22s)</text>
            <text x={w-pad-6} y={yFor(v2a[v2a.length-1])+14} textAnchor="end" fontSize="9" fill={TOKENS.teal} fontWeight="500">v2a (4s)</text>

    /* ===== Cursor ===== */

    function useReducedMotion() {
      const [r, setR] = useState(false);
      useEffect(() => {
        const mq = matchMedia("(prefers-reduced-motion: reduce)");
        setR(mq.matches);
        const h = e => setR(e.matches);
        mq.addEventListener?.("change", h);
        return () => mq.removeEventListener?.("change", h);
      }, []);
      return r;
    }

    function Cursor() {
      const ref = useRef(null);
      const reduced = useReducedMotion();
      const [mode, setMode] = useState("default");
      useEffect(() => {
        if (reduced) return;
        const el = ref.current; if (!el) return;
        let mx = innerWidth/2, my = innerHeight/2;
        let cx = mx, cy = my, raf;
        const move = e => { mx = e.clientX; my = e.clientY; };
        const loop = () => {
          cx += (mx - cx) * 0.18;
          cy += (my - cy) * 0.18;
          el.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
          raf = requestAnimationFrame(loop);
        };
        addEventListener("mousemove", move); loop();
        return () => { removeEventListener("mousemove", move); cancelAnimationFrame(raf); };
      }, [reduced]);
      useEffect(() => {
        if (reduced) return;
        const over = e => {
          const t = e.target;
          if (!(t instanceof Element)) return;
          if (t.closest("[data-cursor-link]") || t.closest("a")) setMode("link");
          else if (t.closest("[data-cursor-artifact]")) setMode("artifact");
          else setMode("default");
        };
        document.addEventListener("mouseover", over);
        return () => document.removeEventListener("mouseover", over);
      }, [reduced]);
      if (reduced) return null;
      return <div ref={ref} className={`cursor cursor--${mode}`} aria-hidden="true" />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
