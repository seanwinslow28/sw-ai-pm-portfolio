<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sean Winslow — Projects section v1 prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --paper: #fff9f0;
      --ink: #1a1a1e;
      --teal: #0a3e42;
      --teal-success: #0f6e56;
      --secondary: #546e71;
      --stamp: #7c2d12;
      --amber: #fac775;
      --paper-low: rgba(255, 249, 240, 0.08);
      --paper-mid: rgba(255, 249, 240, 0.25);
      --paper-65: rgba(255, 249, 240, 0.65);
      --paper-40: rgba(255, 249, 240, 0.4);
      --paper-50: rgba(255, 249, 240, 0.5);
      --strip: rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body { cursor: none; }
    @media (prefers-reduced-motion: reduce) { body { cursor: auto; } }
    @media (hover: none) { body { cursor: auto; } }

    /* ===== Paper buffer above/below to make the torn seams legible in the prototype ===== */
    .paper-buffer {
      height: 96px;
      background: var(--paper);
    }

    /* ===== Section shell ===== */
    .projects {
      position: relative;
      background: var(--teal);
      padding: 96px 52px 96px;
      overflow: hidden;
      opacity: 0;
      animation: fade 240ms linear forwards;
    }

    @keyframes fade { to { opacity: 1; } }

    .projects__inner {
      max-width: 1336px;
      margin: 0 auto;
      position: relative;
    }

    /* ===== Dateline ===== */
    .dateline {
      position: relative;
      margin-bottom: 56px;
    }

    .dateline__line {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      line-height: 1.4;
      font-weight: 500;
      color: var(--paper);
      text-transform: uppercase;
    }

    .dateline__count { color: var(--amber); }
    .dateline__updated { color: var(--paper-65); }

    /* ===== Pencil annotation: "updated weekly" arrow ===== */
    .annotation {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      animation: annoIn 800ms 600ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes annoIn { to { opacity: 1; } }

    .annotation--updated {
      top: 18px;
      left: 280px;
      width: 180px;
      height: 64px;
    }

    .annotation--updated svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .annotation__bob {
      transform-origin: 20% 50%;
      animation: bob 4s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }

    .annotation__label {
      font-family: "Caveat", "Newsreader", cursive;
      font-size: 22px;
      fill: var(--paper);
      opacity: 0.7;
    }

    /* ===== Grid ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 60px 40px;
      position: relative;
    }

    /* ===== Tile ===== */
    .tile {
      position: relative;
      aspect-ratio: 4 / 5;
      background: rgba(0, 0, 0, 0.18);
      border: 0.5px solid var(--paper-low);
      overflow: hidden;
      cursor: none;
      transition: border-color 200ms cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }

    .tile:hover {
      border-color: var(--paper-mid);
    }

    .tile__media {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tile:hover .tile__media { transform: scale(1.04); }

    /* Placeholder media — colored swatches with embedded SVG iconography */
    .tile__placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tile:hover .tile__placeholder { transform: scale(1.04); }

    .tile__placeholder--superuser   { background: linear-gradient(160deg, #0c2d2f 0%, #14545a 100%); }
    .tile__placeholder--mcp          { background: linear-gradient(160deg, #1a2e3a 0%, #2a4f5e 100%); }
    .tile__placeholder--block        { background: linear-gradient(160deg, #2a1f1a 0%, #4a342a 100%); }
    .tile__placeholder--16bitfit     { background: linear-gradient(160deg, #2a1740 0%, #4a2870 100%); }

    .tile__strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 18px 18px;
      background: linear-gradient(to top, var(--strip) 60%, rgba(0,0,0,0) 100%);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tile__row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .tile__frame {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 1.4px;
      color: var(--amber);
      font-weight: 500;
    }

    .tile__status {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 1.4px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .tile__status--active   { color: #ffb15b; }
    .tile__status--coming   { color: #ffb15b; animation: pulse 2.4s ease-in-out infinite; }
    .tile__status--shipped  { color: #4fc4a3; }
    .tile__status--paused   { color: var(--paper-65); }
    .tile__status--archived { color: var(--paper-65); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    .tile__title {
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.15;
      color: var(--paper);
      margin: 4px 0 2px;
    }

    .tile__tags {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 1.2px;
      color: var(--paper-65);
      text-transform: lowercase;
    }

    /* "rev 3" scribble on tile A-1 */
    .tile__scribble {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 56px;
      height: 36px;
      pointer-events: none;
      transform: rotate(8deg);
    }

    .tile__scribble text {
      font-family: "Caveat", cursive;
      font-size: 22px;
      fill: var(--paper);
      opacity: 0.55;
    }

    /* ===== Next-in-production tile ===== */
    .next {
      position: relative;
      aspect-ratio: 4 / 5;
      background: transparent;
      border: 1.5px dashed var(--paper-40);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 32px;
      transition: border-color 240ms ease, border-style 240ms ease;
      cursor: none;
    }

    .next:hover { border-color: var(--paper); }

    .next__title {
      font-family: "Newsreader", Georgia, serif;
      font-weight: 300;
      font-size: 24px;
      line-height: 1.2;
      color: var(--paper);
      text-align: center;
      margin: 0;
    }

    .next__sub {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 1.4px;
      color: var(--amber);
      text-transform: uppercase;
      text-align: center;
    }

    .next__ticks {
      position: absolute;
      inset: 8px;
      pointer-events: none;
      opacity: 0.25;
    }

    /* ===== Registration mark annotation ===== */
    .reg-mark {
      position: absolute;
      right: 0;
      bottom: -40px;
      width: 28px;
      height: 28px;
      pointer-events: none;
      opacity: 0;
      animation: annoIn 800ms 900ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ===== Torn paper edges ===== */
    .torn-top, .torn-bottom {
      position: absolute;
      left: 0;
      right: 0;
      width: 100%;
      height: 32px;
      display: block;
      pointer-events: none;
      z-index: 2;
    }

    .torn-top    { top: -16px; }
    .torn-bottom { bottom: -16px; transform: scaleY(-1); }

    /* ===== Custom cursor with preview ===== */
    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--paper);
      pointer-events: none;
      z-index: 800;
      transition: width 200ms ease, height 200ms ease, border-radius 200ms ease, opacity 200ms ease;
      will-change: transform;
    }

    .cursor--preview {
      width: 220px;
      height: 280px;
      border-radius: 0;
      background-size: cover;
      background-position: center;
      background-color: rgba(255,249,240,0.05);
      border: 0.5px solid var(--paper-mid);
      transform-origin: top left;
    }

    .cursor--calendar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--amber);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cursor__cal-icon {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 16px;
      color: var(--teal);
    }

    /* ===== Reduced motion ===== */
    @media (prefers-reduced-motion: reduce) {
      .projects, .annotation, .reg-mark { animation: fade 200ms linear forwards !important; }
      .annotation__bob, .tile__status--coming { animation: none !important; }
      .tile__media, .tile__placeholder { transition: none !important; }
      .tile:hover .tile__media, .tile:hover .tile__placeholder { transform: none !important; }
    }

    /* ===== Tablet ===== */
    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 40px 32px; }
      .annotation, .reg-mark { display: none; }
    }

    /* ===== Mobile ===== */
    @media (max-width: 640px) {
      .projects { padding: 64px 24px 80px; }
      .grid { grid-template-columns: 1fr; gap: 32px; }
      .tile, .next { aspect-ratio: 4 / 3; }
      .dateline { margin-bottom: 32px; }
    }
  </style>
</head>

<body>
  <div class="paper-buffer"></div>
  <div id="root"></div>
  <div class="paper-buffer"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    const TOKENS = {
      paper: "#FFF9F0",
      teal: "#0A3E42",
      amber: "#FAC775",
      paperLow: "rgba(255,249,240,0.08)",
      paperMid: "rgba(255,249,240,0.25)",
    };

    const DATELINE = {
      label: "WORK",
      count: "5 PIECES",
      updated: "UPDATED 2026-05-18",
    };

    const PROJECTS = [
      {
        frame: "A-1",
        status: "ACTIVE",
        title: "2D Animation Pipeline",
        tags: "animation · agentic · pipeline",
        slug: "animation-pipeline",
        mediaType: "video",
        mediaSrc: "./hero-loop.webm",
        previewSrc: "./hero-loop.webm",
        placeholderClass: null,
        scribble: true,
      },
      {
        frame: "A-2",
        status: "ACTIVE",
        title: "Claude Code Superuser Pack",
        tags: "agents · mcp · ai-pm",
        slug: "superuser-pack",
        mediaType: "placeholder",
        placeholderClass: "tile__placeholder--superuser",
        placeholderIcon: "terminal",
      },
      {
        frame: "A-3",
        status: "SHIPPED",
        title: "Intent Engineering MCP",
        tags: "mcp · ai-pm · infrastructure",
        slug: "intent-engineering-mcp",
        mediaType: "placeholder",
        placeholderClass: "tile__placeholder--mcp",
        placeholderIcon: "mcp",
      },
      {
        frame: "A-4",
        status: "ARCHIVED",
        title: "The Block — Campus + RevOps",
        tags: "pm · b2b · crypto",
        slug: "the-block",
        mediaType: "placeholder",
        placeholderClass: "tile__placeholder--block",
        placeholderIcon: "block",
      },
      {
        frame: "A-5",
        status: "PAUSED",
        title: "16BitFit Battle Mode",
        tags: "game · agentic · phaser",
        slug: "16bitfit",
        mediaType: "placeholder",
        placeholderClass: "tile__placeholder--16bitfit",
        placeholderIcon: "sprite",
      },
    ];

    const NEXT_PIECE = {
      title: "next piece in production",
      sub: "check back ~jun 11",
    };

    function useReducedMotion() {
      const [reduced, setReduced] = useState(false);
      useEffect(() => {
        const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        setReduced(mq.matches);
        const handler = (e) => setReduced(e.matches);
        mq.addEventListener?.("change", handler);
        return () => mq.removeEventListener?.("change", handler);
      }, []);
      return reduced;
    }

    function TornPaperEdge({ variant }) {
      const cls = variant === "top" ? "torn-top" : "torn-bottom";
      return (
        <svg className={cls} viewBox="0 0 1440 32" preserveAspectRatio="none" aria-hidden="true">
          <path
            d="M0,16 Q24,8 48,14 T96,16 T144,12 T192,18 T240,14 T288,20 T336,12 T384,16 T432,10 T480,18 T528,14 T576,20 T624,12 T672,16 T720,8 T768,18 T816,14 T864,20 T912,12 T960,16 T1008,10 T1056,18 T1104,14 T1152,20 T1200,12 T1248,16 T1296,8 T1344,18 T1392,14 T1440,16 L1440,0 L0,0 Z"
            fill={TOKENS.paper}
          />
        </svg>
      );
    }

    function PlaceholderIcon({ kind }) {
      if (kind === "terminal") {
        return (
          <svg viewBox="0 0 200 200" width="55%" height="55%" aria-hidden="true">
            <rect x="20" y="40" width="160" height="120" rx="4" fill="rgba(0,0,0,0.35)" stroke="rgba(255,249,240,0.3)" />
            <circle cx="32" cy="52" r="3" fill="rgba(255,249,240,0.3)" />
            <circle cx="44" cy="52" r="3" fill="rgba(255,249,240,0.3)" />
            <circle cx="56" cy="52" r="3" fill="rgba(255,249,240,0.3)" />
            <text x="32" y="86" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="#FAC775">$ fleet.dispatch</text>
            <text x="32" y="102" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="rgba(255,249,240,0.7)">→ daily-driver  ✓</text>
            <text x="32" y="118" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="rgba(255,249,240,0.7)">→ vault-indexer ✓</text>
            <text x="32" y="134" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="rgba(255,249,240,0.7)">→ judge-layer   ◌</text>
            <text x="32" y="150" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="rgba(255,249,240,0.4)">_</text>
          </svg>
        );
      }
      if (kind === "mcp") {
        return (
          <svg viewBox="0 0 200 200" width="55%" height="55%" aria-hidden="true">
            <circle cx="100" cy="100" r="32" fill="none" stroke="rgba(79,196,163,0.7)" strokeWidth="1.5" />
            <circle cx="40" cy="60" r="18" fill="none" stroke="rgba(255,249,240,0.5)" strokeWidth="1" />
            <circle cx="160" cy="60" r="18" fill="none" stroke="rgba(255,249,240,0.5)" strokeWidth="1" />
            <circle cx="40" cy="140" r="18" fill="none" stroke="rgba(255,249,240,0.5)" strokeWidth="1" />
            <circle cx="160" cy="140" r="18" fill="none" stroke="rgba(255,249,240,0.5)" strokeWidth="1" />
            <line x1="58" y1="60" x2="68" y2="84" stroke="rgba(255,249,240,0.4)" strokeWidth="0.8" />
            <line x1="142" y1="60" x2="132" y2="84" stroke="rgba(255,249,240,0.4)" strokeWidth="0.8" />
            <line x1="58" y1="140" x2="68" y2="116" stroke="rgba(255,249,240,0.4)" strokeWidth="0.8" />
            <line x1="142" y1="140" x2="132" y2="116" stroke="rgba(255,249,240,0.4)" strokeWidth="0.8" />
            <text x="100" y="105" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="11" fill="#4fc4a3">MCP</text>
            <text x="100" y="186" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="8" fill="rgba(255,249,240,0.5)">SHIPPED 2026-05-12</text>
          </svg>
        );
      }
      if (kind === "block") {
        return (
          <svg viewBox="0 0 200 200" width="55%" height="55%" aria-hidden="true">
            <rect x="30" y="40" width="60" height="60" fill="rgba(250,199,117,0.15)" stroke="rgba(250,199,117,0.4)" />
            <rect x="110" y="40" width="60" height="60" fill="rgba(255,249,240,0.08)" stroke="rgba(255,249,240,0.3)" />
            <rect x="30" y="120" width="60" height="40" fill="rgba(255,249,240,0.08)" stroke="rgba(255,249,240,0.3)" />
            <rect x="110" y="120" width="60" height="40" fill="rgba(255,249,240,0.08)" stroke="rgba(255,249,240,0.3)" />
            <text x="60" y="74" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="8" fill="#FAC775">CAMPUS</text>
            <text x="140" y="74" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="8" fill="rgba(255,249,240,0.6)">REVOPS</text>
            <text x="100" y="180" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="8" fill="rgba(255,249,240,0.4)">2022 – 2024</text>
          </svg>
        );
      }
      if (kind === "sprite") {
        return (
          <svg viewBox="0 0 200 200" width="55%" height="55%" aria-hidden="true" shapeRendering="crispEdges">
            {[...Array(8)].map((_, r) =>
              [...Array(8)].map((_, c) => {
                const filled = (r + c) % 3 === 0 || (r === 3 && c >= 2 && c <= 5);
                return <rect key={`${r}-${c}`} x={56 + c*12} y={56 + r*12} width="12" height="12" fill={filled ? "rgba(250,199,117,0.5)" : "rgba(0,0,0,0)"} />;
              })
            )}
            <text x="100" y="186" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="8" fill="rgba(255,249,240,0.5)">BATTLE MODE</text>
          </svg>
        );
      }
      return null;
    }

    function Tile({ project }) {
      const isVideo = project.mediaType === "video";
      const isPlaceholder = project.mediaType === "placeholder";

      const statusCls = `tile__status tile__status--${project.status.toLowerCase()}`;

      return (
        <a
          className="tile"
          href={`/work/${project.slug}`}
          data-cursor-preview={project.previewSrc || ""}
          data-cursor-preview-type={isVideo ? "video" : "image"}
          data-tile
          aria-label={`View case study: ${project.title}`}
          onClick={(e) => e.preventDefault()}
        >
          {isVideo && (
            <video
              className="tile__media"
              src={project.mediaSrc}
              autoPlay muted loop playsInline preload="auto"
              aria-hidden="true"
            />
          )}
          {isPlaceholder && (
            <div className={`tile__placeholder ${project.placeholderClass}`} aria-hidden="true">
              <PlaceholderIcon kind={project.placeholderIcon} />
            </div>
          )}

          {project.scribble && (
            <svg className="tile__scribble" viewBox="0 0 56 36" aria-hidden="true">
              <text x="4" y="24">rev 3</text>
              <path d="M2,30 Q14,28 26,30 T50,28" fill="none" stroke="rgba(255,249,240,0.5)" strokeWidth="0.9" />
            </svg>
          )}

          <div className="tile__strip">
            <div className="tile__row">
              <span className="tile__frame">{project.frame}</span>
              <span className={statusCls}>{project.status}</span>
            </div>
            <h3 className="tile__title">{project.title}</h3>
            <div className="tile__tags">{project.tags}</div>
          </div>
        </a>
      );
    }

    function NextInProduction() {
      return (
        <div className="next" data-cursor-calendar aria-label="Next piece in production. Check back around June 11.">
          <svg className="next__ticks" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <line x1="0" y1="0" x2="10" y2="0" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="0" y1="0" x2="0" y2="10" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="100" y1="0" x2="90" y2="0" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="100" y1="0" x2="100" y2="10" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="0" y1="100" x2="10" y2="100" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="0" y1="100" x2="0" y2="90" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="100" y1="100" x2="90" y2="100" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
            <line x1="100" y1="100" x2="100" y2="90" stroke="rgba(255,249,240,0.4)" strokeWidth="0.6" />
          </svg>
          <h3 className="next__title">next piece<br/>in production</h3>
          <div className="next__sub">check back ~jun 11</div>
        </div>
      );
    }

    function UpdatedWeeklyAnnotation() {
      return (
        <div className="annotation annotation--updated" aria-hidden="true">
          <svg viewBox="0 0 180 64" preserveAspectRatio="xMinYMin meet">
            <g className="annotation__bob">
              <path
                d="M8,40 Q40,12 88,18 Q120,22 138,28"
                fill="none"
                stroke="rgba(255,249,240,0.5)"
                strokeWidth="1.2"
                strokeLinecap="round"
              />
              <path
                d="M138,28 L130,22 M138,28 L132,34"
                fill="none"
                stroke="rgba(255,249,240,0.5)"
                strokeWidth="1.2"
                strokeLinecap="round"
              />
              <text x="18" y="58" className="annotation__label">updated weekly</text>
            </g>
          </svg>
        </div>
      );
    }

    function RegistrationMark() {
      return (
        <svg className="reg-mark" viewBox="0 0 28 28" aria-hidden="true">
          <line x1="14" y1="2"  x2="14" y2="26" stroke="rgba(255,249,240,0.5)" strokeWidth="1.2" />
          <line x1="2"  y1="14" x2="26" y2="14" stroke="rgba(255,249,240,0.5)" strokeWidth="1.2" />
          <line x1="6"  y1="6"  x2="9"  y2="6"  stroke="rgba(255,249,240,0.5)" strokeWidth="1.2" />
          <line x1="22" y1="6"  x2="19" y2="6"  stroke="rgba(255,249,240,0.5)" strokeWidth="1.2" />
          <line x1="6"  y1="22" x2="9"  y2="22" stroke="rgba(255,249,240,0.5)" strokeWidth="1.2" />
          <line x1="22" y1="22" x2="19" y2="22" stroke="rgba(255,249,240,0.5)" strokeWidth="1.2" />
        </svg>
      );
    }

    function Cursor() {
      const cursorRef = useRef(null);
      const reduced = useReducedMotion();
      const [mode, setMode] = useState("default");
      const [previewSrc, setPreviewSrc] = useState(null);
      const [previewType, setPreviewType] = useState("image");

      useEffect(() => {
        if (reduced) return;
        const el = cursorRef.current;
        if (!el) return;
        let mx = window.innerWidth / 2, my = window.innerHeight / 2;
        let cx = mx, cy = my;
        let raf;
        const onMove = (e) => { mx = e.clientX; my = e.clientY; };
        const loop = () => {
          cx += (mx - cx) * 0.18;
          cy += (my - cy) * 0.18;
          const offset = mode === "preview" ? "translate(40px, 40px)" : "translate(-50%, -50%)";
          el.style.transform = `translate(${cx}px, ${cy}px) ${offset}`;
          raf = requestAnimationFrame(loop);
        };
        window.addEventListener("mousemove", onMove);
        loop();
        return () => {
          window.removeEventListener("mousemove", onMove);
          cancelAnimationFrame(raf);
        };
      }, [reduced, mode]);

      useEffect(() => {
        if (reduced) return;
        const onOver = (e) => {
          const t = e.target;
          if (!(t instanceof Element)) return;
          const tile = t.closest("[data-tile]");
          const cal = t.closest("[data-cursor-calendar]");
          if (tile) {
            const src = tile.getAttribute("data-cursor-preview");
            const type = tile.getAttribute("data-cursor-preview-type") || "image";
            setPreviewSrc(src || null);
            setPreviewType(type);
            setMode("preview");
          } else if (cal) {
            setMode("calendar");
            setPreviewSrc(null);
          } else {
            setMode("default");
            setPreviewSrc(null);
          }
        };
        document.addEventListener("mouseover", onOver);
        return () => document.removeEventListener("mouseover", onOver);
      }, [reduced]);

      if (reduced) return null;

      const cls = `cursor cursor--${mode === "preview" ? "preview" : mode === "calendar" ? "calendar" : "default"}`;
      const style = mode === "preview" && previewSrc && previewType !== "video"
        ? { backgroundImage: `url("${previewSrc}")` }
        : {};

      return (
        <div ref={cursorRef} className={cls} style={style} aria-hidden="true">
          {mode === "preview" && previewType === "video" && previewSrc && (
            <video
              src={previewSrc}
              autoPlay muted loop playsInline
              style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
            />
          )}
          {mode === "calendar" && <span className="cursor__cal-icon">▦</span>}
        </div>
      );
    }

    function Projects() {
      return (
        <>
          <section className="projects" aria-labelledby="projects-dateline">
            <TornPaperEdge variant="top" />

            <div className="projects__inner">
              <div className="dateline" id="projects-dateline">
                <div className="dateline__line">
                  <span>{DATELINE.label}</span>
                  <span> · </span>
                  <span className="dateline__count">{DATELINE.count}</span>
                  <span> · </span>
                  <span className="dateline__updated">{DATELINE.updated}</span>
                </div>
                <UpdatedWeeklyAnnotation />
              </div>

              <div className="grid">
                {PROJECTS.map((p) => <Tile key={p.slug} project={p} />)}
                <NextInProduction />
                <RegistrationMark />
              </div>
            </div>

            <TornPaperEdge variant="bottom" />
          </section>
          <Cursor />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Projects />);
  </script>
</body>

</html>
