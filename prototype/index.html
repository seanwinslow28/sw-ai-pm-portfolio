<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sean Winslow — Hero v1 prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --paper: #fff9f0;
      --ink: #1a1a1e;
      --teal: #0a3e42;
      --secondary: #546e71;
      --stamp: #7c2d12;
      --border: rgba(10, 62, 66, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      cursor: none;
    }

    @media (prefers-reduced-motion: reduce) {
      body {
        cursor: auto;
      }
    }

    @media (hover: none) {
      body {
        cursor: auto;
      }
    }

    /* ===== Hero shell ===== */
    .hero {
      position: relative;
      min-height: 720px;
      background: var(--paper);
      overflow: hidden;
      padding: 60px 52px;
      opacity: 0;
      animation: paperFade 200ms linear forwards;
    }

    @keyframes paperFade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .hero__inner {
      max-width: 1336px;
      margin: 0 auto;
      position: relative;
    }

    /* ===== Dateline ===== */
    .dateline {
      margin-bottom: 30px;
    }

    .dateline__line {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      line-height: 1.4;
      font-weight: 400;
    }

    .dateline__stamp {
      color: var(--stamp);
      font-weight: 500;
    }

    .dateline__body {
      color: var(--secondary);
    }

    .dateline__cursor {
      color: var(--secondary);
      margin-left: 2px;
      animation: blink 600ms steps(2, end) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .dateline__divider {
      margin-top: 12px;
      height: 0.5px;
      background: var(--border);
      width: 100%;
    }

    /* ===== Head (title + badge) ===== */
    .hero__head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 32px;
      margin-top: 32px;
    }

    /* Name */
    .name {
      margin: 0;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(56px, 7.2vw, 130px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.8px;
      color: var(--teal);
    }

    .name__char {
      display: inline-block;
      white-space: pre;
      opacity: 0;
      transform: translateY(40px);
      animation: nameIn 600ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .name__char--reduced {
      animation: fadeOnly 200ms linear forwards !important;
    }

    @keyframes nameIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOnly {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Role */
    .role {
      margin-top: 12px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1.8px;
      color: var(--secondary);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(8px);
      animation: roleIn 300ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes roleIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== Body (tagline + character) ===== */
    .hero__body {
      position: relative;
      margin-top: 56px;
      min-height: 480px;
    }

    .tagline {
      margin: 0;
      max-width: 600px;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(26px, 3.2vw, 56px);
      font-weight: 300;
      line-height: 1.22;
      letter-spacing: -0.3px;
      color: var(--ink);
      overflow: hidden;
    }

    .tagline__inner {
      display: inline-block;
      opacity: 0;
      transform: translateY(60%);
      animation: tagIn 700ms cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    @keyframes tagIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== Character (video loop) ===== */
    .character {
      position: absolute;
      right: -180px;
      /* push past the viewport edge — clips the source's right empty space
         so the painted character sits visually flush with the right edge */
      bottom: 80px;
      width: 1024px;
      height: 576px;
      pointer-events: auto;
      opacity: 0;
      animation: characterFadeIn 600ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes characterFadeIn {
      to {
        opacity: 1;
      }
    }

    .character__video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: bottom right;
      user-select: none;
      -webkit-user-drag: none;
      background: transparent;
    }

    /* ===== Badge ===== */
    .badge {
      position: relative;
      width: 142px;
      height: 142px;
      display: inline-block;
      text-decoration: none;
      flex-shrink: 0;
      margin-top: 8px;
      opacity: 0;
      transform: scale(0.6);
      animation: badgeIn 400ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes badgeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .badge__svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .badge__rotor {
      transform-origin: 100px 100px;
      animation: rotate 12s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .badge__text {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1.4px;
      fill: var(--teal);
      text-transform: uppercase;
    }

    .badge:focus-visible {
      outline: 2px dashed var(--teal);
      outline-offset: 6px;
      border-radius: 50%;
    }

    /* ===== Torn paper edge ===== */
    .torn-edge {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 32px;
      display: block;
      pointer-events: none;
    }

    /* ===== Custom cursor ===== */
    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink);
      pointer-events: none;
      z-index: 800;
      mix-blend-mode: difference;
      transition: width 200ms ease, height 200ms ease, background 200ms ease;
      will-change: transform;
    }

    .cursor--name {
      width: 60px;
      height: 60px;
      background: var(--ink);
    }

    .cursor--badge {
      width: 80px;
      height: 80px;
      background: var(--teal);
      mix-blend-mode: normal;
      opacity: 0.85;
    }

    .cursor--character {
      width: 24px;
      height: 24px;
      background: var(--teal);
      mix-blend-mode: normal;
    }

    /* ===== Reduced motion overrides ===== */
    @media (prefers-reduced-motion: reduce) {

      .hero,
      .name__char,
      .role,
      .tagline__inner,
      .character,
      .badge {
        animation: fadeOnly 200ms linear forwards !important;
        transform: none !important;
      }

      .badge__rotor,
      .character__breath,
      .dateline__cursor {
        animation: none !important;
      }
    }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .hero {
        padding: 40px 24px;
        min-height: 640px;
      }

      .hero__head {
        flex-direction: column;
        gap: 16px;
      }

      .name {
        font-size: 48px;
      }

      .tagline {
        font-size: 26px;
        max-width: none;
      }

      .hero__body {
        min-height: 320px;
      }

      .badge {
        width: 56px;
        height: 56px;
        align-self: flex-end;
        margin-top: 0;
      }

      .character {
        width: 100%;
        max-width: 420px;
        height: 240px;
        right: -24px;
        /* counteracts hero padding-right on mobile */
        bottom: -10px;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    const TOKENS = {
      paper: "#FFF9F0",
      ink: "#1A1A1E",
      teal: "#0A3E42",
      secondary: "#546E71",
      stamp: "#7C2D12",
      border: "rgba(10, 62, 66, 0.15)",
    };

    const DATELINE = {
      stamp: "BOSTON, MAY 13, 2026 — ",
      body: "vault indexer wrote 47 chunks at 02:34. fleet green. 7 of 9 agents on.",
    };

    const NAME = "Sean Winslow";
    const ROLE = "/ AI PRODUCT MANAGER";
    const TAGLINE = "Raised by Saturday morning cartoons and Vercel deployment logs.";
    const CHARACTER_VIDEO_SRC = "./hero-loop.webm";
    const CHARACTER_POSTER_SRC = "../sw-portfolio-animation-2026/loop-3-hero-shoulder/loop-3-frames-bg-removed/frame_0001.png";

    function useReducedMotion() {
      const [reduced, setReduced] = useState(false);
      useEffect(() => {
        const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        setReduced(mq.matches);
        const handler = (e) => setReduced(e.matches);
        mq.addEventListener?.("change", handler);
        return () => mq.removeEventListener?.("change", handler);
      }, []);
      return reduced;
    }

    function Dateline({ start = 200 }) {
      const [stampShown, setStampShown] = useState("");
      const [bodyShown, setBodyShown] = useState("");
      const [cursorOn, setCursorOn] = useState(false);
      const reduced = useReducedMotion();

      useEffect(() => {
        if (reduced) {
          setStampShown(DATELINE.stamp);
          setBodyShown(DATELINE.body);
          return;
        }
        const timers = [];
        const t1 = setTimeout(() => {
          const stampDur = 300;
          const stampStep = stampDur / DATELINE.stamp.length;
          DATELINE.stamp.split("").forEach((_, i) => {
            timers.push(setTimeout(() => setStampShown(DATELINE.stamp.slice(0, i + 1)), i * stampStep));
          });
          const bodyStart = stampDur;
          const bodyDur = 200;
          const bodyStep = bodyDur / DATELINE.body.length;
          DATELINE.body.split("").forEach((_, i) => {
            timers.push(setTimeout(() => setBodyShown(DATELINE.body.slice(0, i + 1)), bodyStart + i * bodyStep));
          });
          timers.push(setTimeout(() => setCursorOn(true), bodyStart + bodyDur));
          timers.push(setTimeout(() => setCursorOn(false), bodyStart + bodyDur + 800));
        }, start);
        timers.push(t1);
        return () => timers.forEach(clearTimeout);
      }, [reduced, start]);

      return (
        <div className="dateline" aria-live="polite">
          <div className="dateline__line">
            <span className="dateline__stamp">{stampShown}</span>
            <span className="dateline__body">{bodyShown}</span>
            {cursorOn && <span className="dateline__cursor">▌</span>}
          </div>
          <div className="dateline__divider" />
        </div>
      );
    }

    function Name({ start = 400 }) {
      const reduced = useReducedMotion();
      return (
        <h1 className="name" aria-label={NAME}>
          {NAME.split("").map((ch, i) => (
            <span
              key={i}
              className={"name__char" + (reduced ? " name__char--reduced" : "")}
              style={{ animationDelay: `${start + i * 20}ms` }}
            >
              {ch === " " ? " " : ch}
            </span>
          ))}
        </h1>
      );
    }

    function RoleTag({ start = 700 }) {
      return (
        <div className="role" style={{ animationDelay: `${start}ms` }}>
          {ROLE}
        </div>
      );
    }

    function Tagline({ start = 900 }) {
      return (
        <p className="tagline">
          <span className="tagline__inner" style={{ animationDelay: `${start}ms` }}>{TAGLINE}</span>
        </p>
      );
    }

    function Badge({ start = 1200 }) {
      const text = "GET IN TOUCH • GET IN TOUCH • ";
      return (
        <a
          className="badge"
          href="mailto:sean.winslow28@gmail.com"
          aria-label="Get in touch"
          style={{ animationDelay: `${start}ms` }}
        >
          <svg viewBox="0 0 200 200" className="badge__svg">
            <defs>
              <path
                id="badge-circle"
                d="M 100, 100 m -64, 0 a 64,64 0 1,1 128,0 a 64,64 0 1,1 -128,0"
              />
            </defs>
            <g className="badge__rotor">
              <text className="badge__text">
                <textPath href="#badge-circle" startOffset="0">{text}</textPath>
              </text>
            </g>
            <circle cx="100" cy="100" r="28" fill={TOKENS.teal} />
            <text
              x="100"
              y="106"
              textAnchor="middle"
              fontSize="16"
              fill={TOKENS.paper}
              fontFamily="'JetBrains Mono', monospace"
            >↗</text>
          </svg>
        </a>
      );
    }

    function Character({ start = 1300 }) {
      const reduced = useReducedMotion();
      return (
        <div className="character" style={{ animationDelay: `${start}ms` }} aria-hidden="true">
          {reduced ? (
            <img
              src={CHARACTER_POSTER_SRC}
              alt=""
              className="character__video"
            />
          ) : (
            <video
              src={CHARACTER_VIDEO_SRC}
              poster={CHARACTER_POSTER_SRC}
              autoPlay
              muted
              loop
              playsInline
              preload="auto"
              className="character__video"
            />
          )}
        </div>
      );
    }

    function TornPaperEdge() {
      return (
        <svg className="torn-edge" viewBox="0 0 1440 32" preserveAspectRatio="none" aria-hidden="true">
          <path
            d="M0,16 Q24,8 48,14 T96,16 T144,12 T192,18 T240,14 T288,20 T336,12 T384,16 T432,10 T480,18 T528,14 T576,20 T624,12 T672,16 T720,8 T768,18 T816,14 T864,20 T912,12 T960,16 T1008,10 T1056,18 T1104,14 T1152,20 T1200,12 T1248,16 T1296,8 T1344,18 T1392,14 T1440,16 L1440,32 L0,32 Z"
            fill={TOKENS.paper}
          />
          <path
            d="M0,16 Q24,8 48,14 T96,16 T144,12 T192,18 T240,14 T288,20 T336,12 T384,16 T432,10 T480,18 T528,14 T576,20 T624,12 T672,16 T720,8 T768,18 T816,14 T864,20 T912,12 T960,16 T1008,10 T1056,18 T1104,14 T1152,20 T1200,12 T1248,16 T1296,8 T1344,18 T1392,14 T1440,16"
            fill="none"
            stroke={TOKENS.border}
            strokeWidth="0.5"
          />
        </svg>
      );
    }

    function Cursor() {
      const cursorRef = useRef(null);
      const reduced = useReducedMotion();
      const [hoverState, setHoverState] = useState("default");

      useEffect(() => {
        if (reduced) return;
        const el = cursorRef.current;
        if (!el) return;
        let mx = window.innerWidth / 2;
        let my = window.innerHeight / 2;
        let cx = mx, cy = my;
        let raf;
        const onMove = (e) => { mx = e.clientX; my = e.clientY; };
        const loop = () => {
          cx += (mx - cx) * 0.15;
          cy += (my - cy) * 0.15;
          el.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
          raf = requestAnimationFrame(loop);
        };
        window.addEventListener("mousemove", onMove);
        loop();
        return () => {
          window.removeEventListener("mousemove", onMove);
          cancelAnimationFrame(raf);
        };
      }, [reduced]);

      useEffect(() => {
        if (reduced) return;
        const onOver = (e) => {
          const t = e.target;
          if (!(t instanceof Element)) return;
          if (t.closest(".name")) setHoverState("name");
          else if (t.closest(".character")) setHoverState("character");
          else setHoverState("default");
        };
        document.addEventListener("mouseover", onOver);
        return () => document.removeEventListener("mouseover", onOver);
      }, [reduced]);

      if (reduced) return null;
      return <div ref={cursorRef} className={`cursor cursor--${hoverState}`} aria-hidden="true" />;
    }

    function Hero() {
      return (
        <>
          <section className="hero">
            <div className="hero__inner">
              <Dateline start={200} />
              <div className="hero__head">
                <div className="hero__title">
                  <Name start={400} />
                  <RoleTag start={700} />
                </div>
              </div>
              <div className="hero__body">
                <Tagline start={900} />
                <Character start={1300} />
              </div>
            </div>
            <TornPaperEdge />
          </section>
          <Cursor />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Hero />);
  </script>
</body>

</html>
