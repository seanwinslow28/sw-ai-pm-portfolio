<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sean Winslow — /essays/ v1 prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --paper: #fff9f0;
      --ink: #1a1a1e;
      --teal: #0a3e42;
      --teal-success: #0f6e56;
      --secondary: #546e71;
      --stamp: #7c2d12;
      --amber: #fac775;
      --border: rgba(10, 62, 66, 0.15);
      --border-faint: rgba(10, 62, 66, 0.10);
      --row-hover: rgba(10, 62, 66, 0.04);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { cursor: none; }
    @media (prefers-reduced-motion: reduce) { body { cursor: auto; } }
    @media (hover: none) { body { cursor: auto; } }

    /* ===== Page shell ===== */
    .page {
      position: relative;
      background: var(--paper);
      padding: 60px 52px 80px;
    }
    .page__inner {
      max-width: 1120px;
      margin: 0 auto;
      position: relative;
    }

    .preview-divider {
      max-width: 1120px;
      margin: 80px auto;
      padding: 24px 52px;
      background: var(--ink);
      color: var(--paper);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .preview-divider span { color: var(--amber); }

    /* Torn paper edges */
    .torn-top, .torn-bottom {
      position: absolute;
      left: 0; right: 0;
      width: 100%;
      height: 32px;
      pointer-events: none;
    }
    .torn-top    { top: -16px; }
    .torn-bottom { bottom: -16px; transform: scaleY(-1); }

    /* ===== Dateline ===== */
    .dateline { margin-bottom: 32px; }
    .dateline__line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      line-height: 1.4;
    }
    .dateline__main { flex: 1; }
    .dateline__stamp { color: var(--stamp); font-weight: 500; }
    .dateline__body  { color: var(--secondary); }
    .dateline__time  { color: var(--stamp); font-weight: 500; letter-spacing: 1.6px; }
    .dateline__rule {
      height: 0.5px;
      background: var(--border);
      margin-top: 12px;
    }

    /* ===== Index title block ===== */
    .title-block { margin-top: 40px; }
    .h1 {
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(56px, 6vw, 96px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.6px;
      color: var(--teal);
      margin: 0 0 24px;
    }
    .hook {
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-size: clamp(20px, 2.4vw, 32px);
      font-weight: 300;
      line-height: 1.35;
      letter-spacing: -0.2px;
      color: var(--ink);
      max-width: 780px;
      margin: 0 0 16px;
    }
    .subhead {
      font-family: "Newsreader", Georgia, serif;
      font-size: 18px;
      font-weight: 300;
      line-height: 1.4;
      color: var(--secondary);
      max-width: 620px;
      margin: 0 0 24px;
    }
    .meta-strip {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.6px;
      font-weight: 500;
      color: var(--secondary);
      text-transform: uppercase;
    }
    .meta-strip__rss {
      color: var(--teal);
      text-decoration: none;
      margin-left: 6px;
    }
    .meta-strip__rss:hover { text-decoration: underline; }

    /* ===== Essay rows ===== */
    .essays {
      margin-top: 56px;
      list-style: none;
      padding: 0;
    }
    .essay-row {
      display: grid;
      grid-template-columns: 120px 110px 1fr 200px;
      gap: 32px;
      align-items: center;
      padding: 28px 12px;
      border-bottom: 0.5px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: background-color 200ms ease;
      min-height: 150px;
    }
    .essay-row:first-child { border-top: 0.5px solid var(--border); }
    .essay-row:hover { background: var(--row-hover); }
    .essay-row:hover .essay-row__title::after { transform: scaleX(1); }

    .essay-row__date {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
    }
    .essay-row__date-month { color: var(--stamp); font-weight: 500; }
    .essay-row__date-year  { color: var(--secondary); }

    .pill-status {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid currentColor;
      line-height: 1.2;
      justify-self: start;
    }
    .pill-status--published { color: var(--teal-success); }
    .pill-status--draft     { color: var(--secondary); }

    .essay-row__body { min-width: 0; }
    .essay-row__title {
      position: relative;
      display: inline-block;
      font-family: "Newsreader", Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.2px;
      color: var(--ink);
      margin: 0 0 10px;
    }
    .essay-row__title::after {
      content: "";
      position: absolute;
      left: 0; bottom: -2px;
      width: 100%;
      height: 1px;
      background: var(--teal);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 200ms cubic-bezier(0.16,1,0.3,1);
    }
    .essay-row__excerpt {
      font-family: "Newsreader", Georgia, serif;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.5;
      color: var(--secondary);
      letter-spacing: -0.1px;
      margin: 0;
      max-width: 560px;
    }
    .essay-row__diagram {
      justify-self: end;
      width: 200px;
      height: 110px;
      background: rgba(10, 62, 66, 0.03);
      border: 0.5px solid var(--border);
      padding: 6px;
    }

    /* ===== Footer fold ===== */
    .footer-fold {
      margin-top: 80px;
      padding-top: 28px;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .footer-fold a {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1.2px;
      font-weight: 500;
      color: var(--teal);
      text-decoration: none;
    }
    .footer-fold a:hover { text-decoration: underline; }

    /* ===========================================
     * DEEP DIVE
     * =========================================== */
    .surface-pills {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 16px 0 16px;
    }
    .surface-pill {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.6px;
      font-weight: 500;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--ink);
      color: var(--ink);
      line-height: 1.2;
    }

    .essay-title {
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(40px, 5vw, 72px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--teal);
      margin: 0 0 8px;
      max-width: 900px;
    }
    .essay-subtitle {
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-size: clamp(20px, 2.2vw, 28px);
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: -0.2px;
      color: var(--secondary);
      margin: 0 0 16px;
      max-width: 760px;
    }
    .tags {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--secondary);
      margin-bottom: 16px;
    }
    .published-strip {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.6px;
      font-weight: 500;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .published-strip__pub { color: var(--stamp); }
    .published-strip__rev { color: var(--secondary); margin-left: 12px; }

    .pullquote {
      max-width: 760px;
      margin: 0 auto 64px;
      padding: 32px 8px;
      border-top: 0.5px solid var(--teal);
      border-bottom: 0.5px solid var(--teal);
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-size: clamp(22px, 2.8vw, 32px);
      font-weight: 300;
      line-height: 1.4;
      letter-spacing: -0.3px;
      color: var(--teal);
    }
    .pullquote::before { content: open-quote; color: var(--amber); margin-right: 0.1em; }
    .pullquote::after  { content: close-quote; color: var(--amber); }

    /* ===== Essay body ===== */
    .essay {
      max-width: 680px;
      margin: 0 auto;
    }
    .essay p {
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--ink);
      letter-spacing: -0.1px;
      margin: 0 0 24px;
    }
    .essay h2 {
      position: relative;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(28px, 3.2vw, 40px);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.4px;
      color: var(--teal);
      margin: 56px 0 24px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .essay h2::after {
      content: "#";
      position: absolute;
      right: 0;
      top: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--amber);
      opacity: 0;
      transition: opacity 200ms ease;
    }
    .essay h2:hover::after { opacity: 1; }

    .essay blockquote {
      margin: 28px 0;
      padding-left: 24px;
      border-left: 1px solid var(--secondary);
    }
    .essay blockquote p {
      font-style: italic;
      color: var(--secondary);
      margin-bottom: 8px;
    }
    .essay blockquote cite {
      font-family: "JetBrains Mono", monospace;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--stamp);
      font-weight: 500;
    }

    .essay code {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.86em;
      padding: 1px 6px;
      background: rgba(10, 62, 66, 0.06);
      border-radius: 3px;
    }

    /* ===== Quadrant chart ===== */
    .quadrant-wrap {
      max-width: 880px;
      margin: 56px auto 32px;
    }
    .quadrant-chart {
      width: 100%;
      background: var(--paper);
      border: 0.5px solid var(--border);
      padding: 28px;
    }
    .quadrant-chart svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .quadrant-caption {
      margin-top: 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.8px;
      color: var(--secondary);
      text-align: center;
    }

    /* ===== Quadrant legend ===== */
    .quadrant-legend {
      max-width: 880px;
      margin: 0 auto 64px;
      padding: 18px 24px;
      background: rgba(10, 62, 66, 0.02);
      border: 0.5px solid var(--border);
    }
    .quadrant-legend table {
      width: 100%;
      border-collapse: collapse;
      font-family: "JetBrains Mono", monospace;
    }
    .quadrant-legend td {
      padding: 6px 4px;
      font-size: 13px;
      letter-spacing: 0.4px;
      vertical-align: top;
      color: var(--ink);
    }
    .quadrant-legend td:first-child {
      color: var(--stamp);
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: lowercase;
      width: 90px;
    }
    .quadrant-legend a {
      color: var(--teal);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .quadrant-legend a:hover { border-bottom-color: var(--teal); }
    .quadrant-legend td.muted { color: var(--secondary); }

    /* ===== Role map ===== */
    .rolemap-wrap {
      max-width: 880px;
      margin: 40px auto 0;
    }
    .rolemap {
      width: 100%;
      border-collapse: collapse;
      border: 0.5px solid var(--border);
      font-family: "JetBrains Mono", monospace;
    }
    .rolemap th, .rolemap td {
      padding: 14px 18px;
      border: 0.5px solid var(--border-faint);
      text-align: left;
      vertical-align: middle;
    }
    .rolemap th {
      font-size: 11px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      background: rgba(10, 62, 66, 0.03);
    }
    .rolemap td {
      font-size: 13px;
      letter-spacing: 0.4px;
      color: var(--ink);
    }
    .rolemap td:nth-child(3) { color: var(--secondary); font-style: italic; }
    .rolemap td:last-child { text-align: center; width: 80px; }
    .rolemap a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .rolemap a:hover { text-decoration: underline; }
    .rolemap-validated {
      margin-top: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.2px;
      color: var(--secondary);
    }

    /* ===== Section heading (block, outside .essay) ===== */
    .block { margin: 80px auto; max-width: 880px; }
    .block__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 2.4px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .block__heading::before, .block__heading::after {
      content: "";
      height: 0.5px;
      background: var(--border);
      flex: 1;
    }

    /* ===== Plotted artifacts ===== */
    .plotted {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .plotted li {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.6px;
      line-height: 1.6;
      margin-bottom: 10px;
      color: var(--secondary);
    }
    .plotted li::before {
      content: "→ ";
      color: var(--amber);
      margin-right: 6px;
    }
    .plotted a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .plotted a:hover { text-decoration: underline; }
    .plotted .sep { color: var(--secondary); margin: 0 8px; opacity: 0.6; }

    /* ===== 4Q ===== */
    .fourq__q { margin-bottom: 32px; }
    .fourq__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 0 14px;
      display: flex;
      gap: 18px;
      align-items: baseline;
    }
    .fourq__qnum { color: var(--amber); }
    .fourq__qtitle {
      font-family: "Newsreader", Georgia, serif;
      font-size: 22px;
      letter-spacing: -0.2px;
      font-weight: 400;
      color: var(--teal);
      text-transform: none;
    }
    .fourq__body {
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.1px;
      margin: 0;
    }
    .fourq__body--q1 { font-size: 22px; }

    /* ===== Foot links (3 links) ===== */
    .foot-links {
      max-width: 880px;
      margin: 32px auto 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .foot-links a {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .foot-links a:hover { text-decoration: underline; }

    /* ===== Related ===== */
    .related-row {
      display: flex;
      gap: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      align-items: baseline;
    }
    .related-row__label {
      color: var(--stamp);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      flex-shrink: 0;
      min-width: 220px;
    }
    .related-row__body a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .related-row__body a:hover { text-decoration: underline; }

    /* ===== Next/prev ===== */
    .navfold {
      max-width: 880px;
      margin: 64px auto 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding-top: 32px;
      border-top: 0.5px solid var(--border);
    }
    .navfold__none {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--secondary);
      opacity: 0.6;
    }
    .navfold__next { text-align: right; }

    .reg-mark {
      position: absolute;
      bottom: 24px;
      right: 32px;
      width: 28px;
      height: 28px;
      opacity: 0.7;
      pointer-events: none;
    }

    /* Cursor */
    .cursor {
      position: fixed;
      top: 0; left: 0;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink);
      pointer-events: none;
      z-index: 800;
      mix-blend-mode: difference;
      transition: width 200ms, height 200ms, background 200ms;
      will-change: transform;
    }
    .cursor--link { width: 36px; height: 36px; background: var(--teal); mix-blend-mode: normal; opacity: 0.85; }
    .cursor--row  { width: 24px; height: 24px; background: var(--amber); mix-blend-mode: normal; }

    /* Responsive */
    @media (max-width: 1024px) {
      .essay-row { grid-template-columns: 100px 110px 1fr; }
      .essay-row__diagram { display: none; }
    }
    @media (max-width: 768px) {
      .page { padding: 40px 24px 60px; }
      .preview-divider { margin: 60px auto; padding: 20px 24px; }
      .essay-row { grid-template-columns: 1fr; gap: 6px; padding: 18px 8px; min-height: 0; }
      .h1 { font-size: 44px; }
      .hook { font-size: 20px; }
      .pullquote { padding: 24px 8px; font-size: 19px; }
      .essay h2 { font-size: 24px; }
      .quadrant-wrap, .rolemap-wrap, .quadrant-legend, .block { padding-left: 0; padding-right: 0; }
      .rolemap { font-size: 11px; }
      .rolemap th, .rolemap td { padding: 10px 8px; }
      .related-row { flex-direction: column; }
      .navfold { grid-template-columns: 1fr; }
      .navfold__next { text-align: left; }
    }
    @media (prefers-reduced-motion: reduce) {
      .essay-row, .essay-row__title::after, .essay h2::after { transition: none !important; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    const TOKENS = {
      paper:    "#FFF9F0",
      ink:      "#1A1A1E",
      teal:     "#0A3E42",
      success:  "#0F6E56",
      secondary:"#546E71",
      stamp:    "#7C2D12",
      amber:    "#FAC775",
      border:   "rgba(10,62,66,0.15)",
    };

    function TornEdge({ variant }) {
      const cls = variant === "top" ? "torn-top" : "torn-bottom";
      return (
        <svg className={cls} viewBox="0 0 1440 32" preserveAspectRatio="none" aria-hidden="true">
          <path
            d="M0,16 Q24,8 48,14 T96,16 T144,12 T192,18 T240,14 T288,20 T336,12 T384,16 T432,10 T480,18 T528,14 T576,20 T624,12 T672,16 T720,8 T768,18 T816,14 T864,20 T912,12 T960,16 T1008,10 T1056,18 T1104,14 T1152,20 T1200,12 T1248,16 T1296,8 T1344,18 T1392,14 T1440,16 L1440,0 L0,0 Z"
            fill={TOKENS.paper}
          />
        </svg>
      );
    }

    function Dateline({ stamp, body, readingTime }) {
      return (
        <div className="dateline">
          <div className="dateline__line">
            <div className="dateline__main">
              <span className="dateline__stamp">{stamp}</span>
              <span className="dateline__body">{body}</span>
            </div>
            {readingTime && <div className="dateline__time">{readingTime} MIN READ</div>}
          </div>
          <div className="dateline__rule" />
        </div>
      );
    }

    /* ===== Quadrant chart (Mermaid stand-in) ===== */
    function QuadrantChart({ thumb }) {
      // size & coords
      const W = thumb ? 200 : 720;
      const H = thumb ? 110 : 480;
      const m = thumb ? 8 : 56;
      const x = (v) => m + (v) * (W - 2*m);
      const y = (v) => H - m - (v) * (H - 2*m);
      const points = [
        { k: "iemcp",   xv: 0.85, yv: 0.78, c: TOKENS.teal },

    function useReducedMotion() {
      const [r, setR] = useState(false);
      useEffect(() => {
        const mq = matchMedia("(prefers-reduced-motion: reduce)");
        setR(mq.matches);
        const h = e => setR(e.matches);
        mq.addEventListener?.("change", h);
        return () => mq.removeEventListener?.("change", h);
      }, []);
      return r;
    }
    function Cursor() {
      const ref = useRef(null);
      const reduced = useReducedMotion();
      const [mode, setMode] = useState("default");
      useEffect(() => {
        if (reduced) return;
        const el = ref.current; if (!el) return;
        let mx = innerWidth/2, my = innerHeight/2;
        let cx = mx, cy = my, raf;
        const move = e => { mx = e.clientX; my = e.clientY; };
        const loop = () => {
          cx += (mx - cx) * 0.18;
          cy += (my - cy) * 0.18;
          el.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
          raf = requestAnimationFrame(loop);
        };
        addEventListener("mousemove", move); loop();
        return () => { removeEventListener("mousemove", move); cancelAnimationFrame(raf); };
      }, [reduced]);
      useEffect(() => {
        if (reduced) return;
        const over = e => {
          const t = e.target;
          if (!(t instanceof Element)) return;
          if (t.closest("[data-cursor-row]")) setMode("row");
          else if (t.closest("a")) setMode("link");
          else setMode("default");
        };
        document.addEventListener("mouseover", over);
        return () => document.removeEventListener("mouseover", over);
      }, [reduced]);
      if (reduced) return null;
      return <div ref={ref} className={`cursor cursor--${mode}`} aria-hidden="true" />;
    }
