<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sean Winslow — /architecture/ v1 prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --paper: #fff9f0;
      --ink: #1a1a1e;
      --teal: #0a3e42;
      --teal-success: #0f6e56;
      --secondary: #546e71;
      --stamp: #7c2d12;
      --amber: #fac775;
      --border: rgba(10, 62, 66, 0.15);
      --border-faint: rgba(10, 62, 66, 0.10);
      --row-hover: rgba(10, 62, 66, 0.04);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { cursor: none; }
    @media (prefers-reduced-motion: reduce) { body { cursor: auto; } }
    @media (hover: none) { body { cursor: auto; } }

    /* ===== Page shell ===== */
    .page {
      position: relative;
      background: var(--paper);
      padding: 60px 52px 80px;
    }
    .page__inner {
      max-width: 1120px;
      margin: 0 auto;
      position: relative;
    }
    .page__essay {
      max-width: 760px;
      margin: 0 auto;
    }

    /* Preview divider */
    .preview-divider {
      max-width: 1120px;
      margin: 80px auto;
      padding: 24px 52px;
      background: var(--ink);
      color: var(--paper);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .preview-divider span { color: var(--amber); }

    /* Torn paper edges (top + bottom) */
    .torn-top, .torn-bottom {
      position: absolute;
      left: 0; right: 0;
      width: 100%;
      height: 32px;
      pointer-events: none;
    }
    .torn-top    { top: -16px; }
    .torn-bottom { bottom: -16px; transform: scaleY(-1); }

    /* ===== Dateline ===== */
    .dateline {
      margin-bottom: 32px;
      position: relative;
    }
    .dateline__line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      line-height: 1.4;
    }
    .dateline__main {
      flex: 1;
    }
    .dateline__stamp { color: var(--stamp); font-weight: 500; }
    .dateline__body  { color: var(--secondary); }
    .dateline__time  { color: var(--stamp); font-weight: 500; letter-spacing: 1.6px; }
    .dateline__rule {
      height: 0.5px;
      background: var(--border);
      margin-top: 12px;
    }

    /* ===== Index — title block ===== */
    .title-block { margin-top: 40px; }
    .h1 {
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(56px, 6vw, 96px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.6px;
      color: var(--teal);
      margin: 0 0 24px;
    }
    .hook {
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-size: clamp(20px, 2.4vw, 32px);
      font-weight: 300;
      line-height: 1.35;
      letter-spacing: -0.2px;
      color: var(--ink);
      max-width: 780px;
      margin: 0 0 16px;
    }
    .subhead {
      font-family: "Newsreader", Georgia, serif;
      font-size: 18px;
      font-weight: 300;
      line-height: 1.4;
      color: var(--secondary);
      max-width: 620px;
      margin: 0 0 24px;
    }
    .meta-strip {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.6px;
      font-weight: 500;
      color: var(--secondary);
      text-transform: uppercase;
    }
    .meta-strip .meta-strip__rss {
      color: var(--teal);
      text-decoration: none;
      margin-left: 6px;
    }
    .meta-strip .meta-strip__rss:hover { text-decoration: underline; }

    /* ===== Writeup rows ===== */
    .writeups {
      margin-top: 56px;
      list-style: none;
      padding: 0;
    }
    .writeup-row {
      display: grid;
      grid-template-columns: 120px 96px 1fr 200px;
      gap: 32px;
      align-items: center;
      padding: 22px 12px;
      border-bottom: 0.5px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: background-color 200ms ease;
      min-height: 140px;
    }
    .writeup-row:first-child { border-top: 0.5px solid var(--border); }
    .writeup-row:hover { background: var(--row-hover); }
    .writeup-row:hover .writeup-row__title::after { transform: scaleX(1); }

    .writeup-row__date {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
    }
    .writeup-row__date-month { color: var(--stamp); font-weight: 500; }
    .writeup-row__date-year  { color: var(--secondary); }

    .pill-status {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid currentColor;
      line-height: 1.2;
      justify-self: start;
    }
    .pill-status--shipped { color: var(--teal-success); }
    .pill-status--draft   { color: var(--secondary); }

    .writeup-row__body { min-width: 0; }
    .writeup-row__title {
      position: relative;
      display: inline-block;
      font-family: "Newsreader", Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.2px;
      color: var(--ink);
      margin: 0 0 8px;
    }
    .writeup-row__title::after {
      content: "";
      position: absolute;
      left: 0; bottom: -2px;
      width: 100%;
      height: 1px;
      background: var(--teal);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 200ms cubic-bezier(0.16,1,0.3,1);
    }
    .writeup-row__lead {
      font-family: "Newsreader", Georgia, serif;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.45;
      color: var(--secondary);
      letter-spacing: -0.1px;
      margin: 0;
      max-width: 560px;
    }

    .writeup-row__diagram {
      justify-self: end;
      width: 200px;
      height: 90px;
      background: rgba(10, 62, 66, 0.03);
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    /* ===== Footer fold ===== */
    .footer-fold {
      margin-top: 80px;
      padding-top: 28px;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .footer-fold a {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1.2px;
      font-weight: 500;
      color: var(--teal);
      text-decoration: none;
    }
    .footer-fold a:hover { text-decoration: underline; }

    /* ===========================================
     * DEEP-DIVE PAGE
     * =========================================== */
    .surface-pills {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 16px 0 16px;
    }
    .surface-pill {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.6px;
      font-weight: 500;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--ink);
      color: var(--ink);
      line-height: 1.2;
    }

    .case-title {
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(40px, 5vw, 72px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--teal);
      margin: 0 0 16px;
      max-width: 900px;
    }
    .tags {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--secondary);
      margin-bottom: 48px;
    }

    /* Thesis pullquote */
    .pullquote {
      max-width: 760px;
      margin: 0 auto 64px;
      padding: 32px 8px;
      border-top: 0.5px solid var(--teal);
      border-bottom: 0.5px solid var(--teal);
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-size: clamp(22px, 2.8vw, 32px);
      font-weight: 300;
      line-height: 1.4;
      letter-spacing: -0.3px;
      color: var(--teal);
    }
    .pullquote::before { content: open-quote; color: var(--amber); margin-right: 0.1em; }
    .pullquote::after  { content: close-quote; color: var(--amber); }

    /* Essay body */
    .essay {
      max-width: 680px;
      margin: 0 auto 64px;
    }
    .essay p {
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--ink);
      letter-spacing: -0.1px;
      margin: 0 0 24px;
    }
    .essay h2 {
      position: relative;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(28px, 3.2vw, 40px);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.4px;
      color: var(--teal);
      margin: 56px 0 24px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .essay h2::after {
      content: "#";
      position: absolute;
      right: 0;
      top: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--amber);
      opacity: 0;
      transition: opacity 200ms ease;
    }
    .essay h2:hover::after { opacity: 1; }

    .essay a {
      color: var(--teal);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 2px;
    }
    .essay a:hover { text-decoration-color: var(--teal); }

    /* Code block */
    .code {
      background: rgba(10, 62, 66, 0.04);
      border: 0.5px solid var(--border);
      padding: 16px 18px;
      margin: 20px 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink);
      letter-spacing: 0.2px;
      white-space: pre;
      overflow-x: auto;
    }
    .code .c-key  { color: var(--teal); font-weight: 500; }
    .code .c-str  { color: var(--teal-success); }
    .code .c-com  { color: var(--secondary); font-style: italic; }
    .code .c-num  { color: var(--stamp); }

    /* HONEST NOTE callout */
    .honest-note {
      margin: 32px 0;
      padding: 20px 24px;
      border-left: 1px solid var(--secondary);
      background: var(--paper);
    }
    .honest-note__prefix {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--stamp);
      margin-bottom: 8px;
    }
    .honest-note__body {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0.4px;
      color: var(--secondary);
      margin: 0;
    }

    /* ER Diagram */
    .er-diagram {
      max-width: 880px;
      margin: 48px auto;
      padding: 32px;
      background: var(--paper);
      border: 0.5px solid var(--border);
      overflow-x: auto;
    }
    .er-diagram svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .er-caption {
      margin-top: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.8px;
      color: var(--secondary);
      text-align: center;
    }

    /* Scoreboard */
    .scoreboard-wrap {
      max-width: 880px;
      margin: 56px auto;
    }
    .scoreboard-heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2.4px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .scoreboard-heading::before, .scoreboard-heading::after {
      content: "";
      height: 0.5px;
      background: var(--border);
      flex: 1;
    }
    .scoreboard {
      width: 100%;
      border-collapse: collapse;
      border: 0.5px solid var(--border);
      font-family: "JetBrains Mono", monospace;
    }
    .scoreboard th,
    .scoreboard td {
      padding: 14px 18px;
      border: 0.5px solid var(--border-faint);
      text-align: center;
      vertical-align: middle;
    }
    .scoreboard th {
      font-size: 11px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      background: rgba(10, 62, 66, 0.03);
    }
    .scoreboard th:first-child,
    .scoreboard td:first-child {
      text-align: left;
      font-size: 13px;
      letter-spacing: 0.4px;
      color: var(--ink);
      font-weight: 500;
    }
    .scoreboard td:first-child { font-weight: 500; }
    .scoreboard .score-svg {
      width: 18px;
      height: 18px;
      display: inline-block;
    }
    .score-legend {
      margin-top: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--secondary);
      text-align: center;
    }
    .score-legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin: 0 10px;
    }

    /* Try It Yourself callout */
    .try-it {
      max-width: 760px;
      margin: 64px auto;
      padding: 24px 28px;
      border-left: 1px solid var(--teal);
      background: rgba(10, 62, 66, 0.04);
    }
    .try-it__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.8px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--stamp);
      margin: 0 0 12px;
    }
    .try-it__body {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .try-it__code {
      background: rgba(10, 62, 66, 0.06);
      border: 0.5px solid var(--border);
      padding: 14px 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--ink);
      white-space: pre;
      overflow-x: auto;
    }
    .try-it__link {
      display: inline-block;
      margin-top: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 0.6px;
      color: var(--teal);
      text-decoration: none;
    }
    .try-it__link:hover { text-decoration: underline; }

    /* Block heading (Methods / Explanation / Related) */
    .block { margin: 80px 0; max-width: 880px; margin-left: auto; margin-right: auto; }
    .block__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 2.4px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .block__heading::before, .block__heading::after {
      content: "";
      height: 0.5px;
      background: var(--border);
      flex: 1;
    }

    /* Methods strip */
    .methods-table {
      width: 100%;
      border-collapse: collapse;
      font-family: "JetBrains Mono", monospace;
    }
    .methods-table th, .methods-table td {
      text-align: left;
      padding: 14px 18px;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
      letter-spacing: 0.6px;
      vertical-align: top;
    }
    .methods-table th {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--stamp);
      font-weight: 500;
      text-transform: uppercase;
    }
    .methods-table td:first-child { color: var(--ink); font-weight: 500; }
    .methods-table td:nth-child(2),
    .methods-table td:nth-child(3) { color: var(--secondary); }
    .methods-table a { color: var(--teal); text-decoration: none; border-bottom: 1px solid var(--teal); }
    .methods-table a:hover { background: rgba(10, 62, 66, 0.04); }

    /* 4Q block */
    .fourq__q { margin-bottom: 32px; }
    .fourq__heading {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 2px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 0 14px;
      display: flex;
      gap: 18px;
      align-items: baseline;
    }
    .fourq__qnum { color: var(--amber); }
    .fourq__qtitle {
      font-family: "Newsreader", Georgia, serif;
      font-size: 22px;
      letter-spacing: -0.2px;
      font-weight: 400;
      color: var(--teal);
      text-transform: none;
    }
    .fourq__body {
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: -0.1px;
      margin: 0;
    }
    .fourq__body--q1 { font-size: 22px; }
    .canonical-links {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .canonical-links a {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--teal);
      text-decoration: none;
    }
    .canonical-links a:hover { text-decoration: underline; }

    /* Related */
    .related-row {
      display: flex;
      gap: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      align-items: baseline;
    }
    .related-row__label {
      color: var(--stamp);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      flex-shrink: 0;
      min-width: 180px;
    }
    .related-row__body a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }
    .related-row__body a:hover { text-decoration: underline; }

    /* Next / prev */
    .navfold {
      max-width: 880px;
      margin: 64px auto 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding-top: 32px;
      border-top: 0.5px solid var(--border);
    }
    .navfold a {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--teal);
      text-decoration: none;
      display: block;
    }
    .navfold a:hover { text-decoration: underline; }
    .navfold__hint {
      display: block;
      font-size: 11px;
      letter-spacing: 1.6px;
      color: var(--secondary);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .navfold__next { text-align: right; }
    .navfold__none {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--secondary);
      opacity: 0.6;
    }

    /* Registration mark */
    .reg-mark {
      position: absolute;
      bottom: 24px;
      right: 32px;
      width: 28px;
      height: 28px;
      opacity: 0.7;
      pointer-events: none;
    }

    /* Cursor */
    .cursor {
      position: fixed;
      top: 0; left: 0;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ink);
      pointer-events: none;
      z-index: 800;
      mix-blend-mode: difference;
      transition: width 200ms, height 200ms, background 200ms;
      will-change: transform;
    }
    .cursor--link { width: 36px; height: 36px; background: var(--teal); mix-blend-mode: normal; opacity: 0.85; }
    .cursor--row  { width: 24px; height: 24px; background: var(--amber); mix-blend-mode: normal; }

    /* Responsive */
    @media (max-width: 1024px) {
      .writeup-row { grid-template-columns: 100px 96px 1fr; }
      .writeup-row__diagram { display: none; }
    }
    @media (max-width: 768px) {
      .page { padding: 40px 24px 60px; }
      .preview-divider { margin: 60px auto; padding: 20px 24px; }
      .writeup-row { grid-template-columns: 1fr; gap: 6px; padding: 18px 8px; min-height: 0; }
      .h1 { font-size: 44px; }
      .hook { font-size: 20px; }
      .pullquote { padding: 24px 8px; font-size: 19px; }
      .essay h2 { font-size: 24px; }
      .navfold { grid-template-columns: 1fr; }
      .navfold__next { text-align: left; }
      .related-row { flex-direction: column; }
      .scoreboard { font-size: 11px; }
      .scoreboard th, .scoreboard td { padding: 10px 8px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .writeup-row, .writeup-row__title::after, .essay h2::after { transition: none !important; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    const TOKENS = {
      paper:    "#FFF9F0",
      ink:      "#1A1A1E",

              <p>
                In Nate B. Jones' framework, <em>agent infrastructure</em> is a tool that can hold persistent
                state across sessions, expose defined verbs an agent can call, name ownership for every artifact,
                enforce permissions on those artifacts, and answer queries about its own audit history. Notion holds
                state, but the verbs are buried in a UI a model can't see. Default Obsidian gives you flat files
                and almost nothing else.
              </p>
              <p>
                Sean's vault — Obsidian, plus an SQLite typed-edge layer, plus git, plus the Daily Driver agent,
                plus a JSONL transactions log — passes three of the five tests, fails two, and the failures are
                where <code>vault-knowledge-mcp</code> and the Judge Layer are going. This is that scorecard.
              </p>

              <h2 id="persistent-state">Persistent State</h2>
              <p>
                <strong>Diagnostic.</strong> Can the system hold what an agent learned last Thursday so the agent
                doesn't relearn it on Friday? The vault stores every connection article the synthesizer writes back
                to the typed-edge graph as a side effect — 47 production edges as of this writing, all queryable from
                a 30ms SQL call.
              </p>
              <div className="code">
{`SELECT source, target, relation, confidence
FROM concept_edges
WHERE relation = `}<span className="c-str">'contradicts'</span>{`
ORDER BY confidence DESC;
`}<span className="c-com">-- 30ms over 47 edges. No LLM in the loop.</span>
              </div>

              <h2 id="defined-verbs">Defined Verbs</h2>
              <p>
                <strong>Diagnostic.</strong> Are the operations an agent can perform named, typed, and discoverable?
                The vault exposes six relation types — <code>supports</code>, <code>contradicts</code>,{" "}
                <code>evolved_into</code>, <code>supersedes</code>, <code>depends_on</code>,{" "}
                <code>related_to</code> — each defined by a CHECK constraint at the SQLite layer. The agent doesn't
                need a wrapper to discover them; it can introspect the schema directly.
              </p>

              <h2 id="ownership">Ownership</h2>
              <p>
                <strong>Diagnostic.</strong> Who created this? Who can change it? Can an agent verify provenance
                before acting on the data? Sean's vault answers the first two via git history and filesystem
                attribution. The third — verifying provenance with cryptographic surety — is where Linear pulls
                ahead.
              </p>
              <HonestNote>
                Linear is genuinely better here. That gap is exactly why <code>vault-knowledge-mcp</code> matters —
                it's the first step toward giving the vault Linear-grade ownership semantics on the axes that
                matter for agent control.
              </HonestNote>

              <p>
                <strong>Diagnostic.</strong> Can the system reject a write or read based on role? The vault has POSIX
                filesystem permissions plus git remote access. That's enough for a single-author vault, not enough
                for a multi-agent fleet writing concurrently against the same SQLite file.
              </p>

                <span className="navfold__hint">{d.navfold.next.date} →</span>
                {d.navfold.next.title}
              </a>
            </div>

            <svg className="reg-mark" viewBox="0 0 28 28" aria-hidden="true">
              <line x1="14" y1="2"  x2="14" y2="26" stroke={TOKENS.amber} strokeWidth="1.2" />
              <line x1="2"  y1="14" x2="26" y2="14" stroke={TOKENS.amber} strokeWidth="1.2" />
              <line x1="6"  y1="6"  x2="9"  y2="6"  stroke={TOKENS.amber} strokeWidth="1.2" />
              <line x1="22" y1="6"  x2="19" y2="6"  stroke={TOKENS.amber} strokeWidth="1.2" />
              <line x1="6"  y1="22" x2="9"  y2="22" stroke={TOKENS.amber} strokeWidth="1.2" />
              <line x1="22" y1="22" x2="19" y2="22" stroke={TOKENS.amber} strokeWidth="1.2" />
            </svg>
          </div>
        </section>
      );
    }

    /* ===== Cursor ===== */
    function useReducedMotion() {
      const [r, setR] = useState(false);
      useEffect(() => {
        const mq = matchMedia("(prefers-reduced-motion: reduce)");
        setR(mq.matches);
        const h = e => setR(e.matches);
        mq.addEventListener?.("change", h);
        return () => mq.removeEventListener?.("change", h);
      }, []);
      return r;
    }
    function Cursor() {
      const ref = useRef(null);
      const reduced = useReducedMotion();
      const [mode, setMode] = useState("default");
      useEffect(() => {
        if (reduced) return;
        const el = ref.current; if (!el) return;
        let mx = innerWidth/2, my = innerHeight/2;
        let cx = mx, cy = my, raf;
        const move = e => { mx = e.clientX; my = e.clientY; };
        const loop = () => {
          cx += (mx - cx) * 0.18;
          cy += (my - cy) * 0.18;
          el.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
          raf = requestAnimationFrame(loop);
        };
        addEventListener("mousemove", move); loop();
        return () => { removeEventListener("mousemove", move); cancelAnimationFrame(raf); };
      }, [reduced]);
      useEffect(() => {
        if (reduced) return;
        const over = e => {
          const t = e.target;
          if (!(t instanceof Element)) return;
          if (t.closest("[data-cursor-row]")) setMode("row");
          else if (t.closest("a")) setMode("link");
          else setMode("default");
        };
        document.addEventListener("mouseover", over);
        return () => document.removeEventListener("mouseover", over);
      }, [reduced]);
      if (reduced) return null;
      return <div ref={ref} className={`cursor cursor--${mode}`} aria-hidden="true" />;
    }

    function App() {
      return (
        <>
          <IndexPage />
          <div className="preview-divider">
            ↓ PROTOTYPE-ONLY DIVIDER · DEEP-DIVE PAGE PREVIEW BELOW (<span>/architecture/vault-scorecard/</span>) ↓
          </div>
          <DeepDive />
          <Cursor />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
