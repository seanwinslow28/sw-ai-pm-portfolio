<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sean Winslow — About v1 prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;500;600&family=Homemade+Apple&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --paper: #fff9f0;
      --ink: #1a1a1e;
      --teal: #0a3e42;
      --teal-success: #0f6e56;
      --secondary: #546e71;
      --stamp: #7c2d12;
      --amber: #fac775;
      --border: rgba(10, 62, 66, 0.15);
      --anno: rgba(10, 62, 66, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      cursor: none;
    }

    @media (prefers-reduced-motion: reduce) {
      body {
        cursor: auto;
      }
    }

    @media (hover: none) {
      body {
        cursor: auto;
      }
    }

    /* ===== Page shell ===== */
    .about {
      position: relative;
      background: var(--paper);
      padding: 60px 52px 80px;
      opacity: 0;
      animation: fade 200ms linear forwards;
    }

    @keyframes fade {
      to {
        opacity: 1;
      }
    }

    .about__inner {
      max-width: 1120px;
      margin: 0 auto;
      position: relative;
    }

    /* ===== Dateline ===== */
    .dateline {
      position: relative;
      margin-bottom: 24px;
    }

    .dateline__line {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 1.2px;
      line-height: 1.4;
      font-weight: 400;
    }

    .dateline__stamp {
      color: var(--stamp);
      font-weight: 500;
    }

    .dateline__body {
      color: var(--secondary);
    }

    .dateline__suffix {
      color: var(--stamp);
      font-weight: 500;
      letter-spacing: 1.6px;
    }

    .dateline__rule {
      height: 0.5px;
      background: var(--border);
      margin-top: 12px;
    }

    /* ===== "updated weekly" pencil annotation ===== */
    .anno-updated {
      position: absolute;
      top: 20px;
      left: 320px;
      width: 180px;
      height: 56px;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 800ms 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .anno-updated__bob {
      transform-origin: 20% 50%;
      animation: bob 4s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: rotate(-1.4deg);
      }

      50% {
        transform: rotate(1.4deg);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .anno-label-cursive {
      font-family: "Caveat", cursive;
      font-size: 20px;
      fill: var(--anno);
    }

    /* ===== Hero — lead + character ===== */
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 480px);
      gap: 48px;
      align-items: center;
      margin-top: 60px;
      min-height: 560px;
    }

    .lead {
      max-width: 540px;
    }

    .lead__line {
      margin: 0 0 18px;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(36px, 4vw, 64px);
      line-height: 1.08;
      letter-spacing: -0.4px;
      font-weight: 300;
      color: var(--ink);
      opacity: 0;
      transform: translateY(36px);
      animation: leadIn 900ms cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    .lead__line:nth-child(1) {
      animation-delay: 400ms;
    }

    .lead__line:nth-child(2) {
      animation-delay: 600ms;
    }

    .lead__line:nth-child(3) {
      animation-delay: 800ms;
    }

    @keyframes leadIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .character {
      position: relative;
      width: 100%;
      max-width: 480px;
      max-height: 640px;
      opacity: 0;
      animation: fadeIn 600ms 600ms linear forwards;
    }

    .character__img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .character__placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed var(--border);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--secondary);
      letter-spacing: 1.4px;
    }

    /* ===== Live pulse strip ===== */
    .pulse {
      margin-top: 80px;
      padding: 22px 0;
      border-top: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      letter-spacing: 0.8px;
      line-height: 1.7;
      color: var(--secondary);
      opacity: 0;
      animation: pulseIn 400ms 1300ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes pulseIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pulse__prefix {
      color: var(--stamp);
      font-weight: 500;
      letter-spacing: 1.6px;
    }

    .pulse__live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal-success);
      margin-right: 8px;
      vertical-align: middle;
      animation: livePulse 1.8s ease-in-out infinite;
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.35;
        transform: scale(0.75);
      }
    }

    /* ===== Section heading band ===== */
    .band {
      margin-top: 120px;
      position: relative;
    }

    .band__heading {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 40px;
    }

    .band__frame {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 1.8px;
      color: var(--amber);
      font-weight: 500;
    }

    .band__title {
      font-family: "Caveat", cursive;
      font-size: 48px;
      font-weight: 500;
      color: var(--teal);
      line-height: 1;
      margin: 0;
    }

    .band__title::before {
      content: "// ";
      opacity: 0.4;
    }

    .band__title::after {
      content: " //";
      opacity: 0.4;
    }

    /* ===== B-1 Timeline ===== */
    .timeline {
      display: grid;
      grid-template-columns: 1fr 64px 1fr;
      gap: 24px;
      position: relative;
    }

    .timeline__col-head {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--stamp);
      font-weight: 500;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .timeline__col-head--right {
      text-align: right;
    }

    .timeline__gutter {
      position: relative;
      width: 64px;
    }

    .timeline__gutter-svg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 100%;
    }

    .row {
      display: contents;
    }

    .row__cell {
      padding: 18px 0;
      position: relative;
    }

    .row__cell--left {
      text-align: right;
      padding-right: 12px;
    }

    .row__cell--right {
      text-align: left;
      padding-left: 12px;
    }

    .row__age {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.4px;
      color: var(--stamp);
      font-weight: 500;
      display: block;
      margin-bottom: 4px;
    }

    .row__body {
      font-family: "Newsreader", Georgia, serif;
      font-size: 18px;
      line-height: 1.35;
      color: var(--ink);
      font-weight: 400;
      letter-spacing: -0.1px;
    }

    .gutter-arrow {
      position: absolute;
      pointer-events: none;
      width: 88px;
      height: 36px;
      left: 50%;
      transform: translateX(-50%);
    }

    .gutter-arrow text {
      font-family: "Caveat", cursive;
      font-size: 14px;
      fill: var(--anno);
    }

    /* ===== Kid drawing margin scan ===== */
    .kid-drawing {
      position: absolute;
      left: -120px;
      top: 320px;
      width: 90px;
      height: 110px;
      transform: rotate(-6deg);
      opacity: 0.85;
    }

    /* ===== B-2 Thesis ===== */
    .thesis {
      max-width: 680px;
      margin: 0;
      position: relative;
    }

    .thesis p {
      font-family: "Newsreader", Georgia, serif;
      font-size: 22px;
      line-height: 1.5;
      font-weight: 300;
      letter-spacing: -0.2px;
      color: var(--ink);
      margin: 0 0 24px;
    }

    /* coffee ring */
    .coffee-ring {
      position: absolute;
      right: -40px;
      top: 80px;
      width: 110px;
      height: 110px;
      pointer-events: none;
      opacity: 0.3;
    }

    /* ===== B-3 Cartoon canon ===== */
    .canon {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 60px 40px;
    }

    .cel-wrap {
      display: flex;
      flex-direction: column;
    }

    .cel {
      width: 100%;
      aspect-ratio: 280/320;
      background: #ffffff;
      border: 0.5px solid var(--border);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 18px;
      overflow: hidden;
    }

    .cel__pegs {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 18px;
    }

    .cel__study {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    .cel__name {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 1.2px;
      font-weight: 500;
      color: var(--ink);
    }

    .cel__name-year {
      color: var(--secondary);
      font-weight: 400;
      margin-left: 4px;
    }

    .caption {
      margin-top: 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      letter-spacing: 0.8px;
      color: var(--secondary);
    }

    .caption__noun {
      color: var(--stamp);
      font-weight: 500;
      letter-spacing: 1.6px;
    }

    /* this-one-rewires-you annotation */
    .rewire-arrow {
      position: absolute;
      pointer-events: none;
      width: 160px;
      height: 60px;
    }

    .rewire-arrow text {
      font-family: "Caveat", cursive;
      font-size: 17px;
      fill: var(--anno);
    }

    /* ===== B-4 Availability ===== */
    .availability {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border: 1px solid var(--teal-success);
      border-radius: 999px;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      letter-spacing: 1.8px;
      font-weight: 500;
      color: var(--teal-success);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .availability__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal-success);
      animation: livePulse 1.8s ease-in-out infinite;
    }

    .availability__geo {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 1.4px;
      color: var(--secondary);
      margin-bottom: 28px;
    }

    .going p {
      max-width: 680px;
      font-family: "Newsreader", Georgia, serif;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 300;
      color: var(--ink);
      margin: 0 0 18px;
    }

    /* ===== B-5 Proof points ===== */
    .proof {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .proof li {
      margin: 0 0 14px;
      position: relative;
    }

    .proof a {
      font-family: "JetBrains Mono", monospace;
      font-size: 15px;
      letter-spacing: 0.6px;
      font-weight: 500;
      color: var(--teal);
      text-decoration: none;
      transition: text-decoration 150ms;
    }

    .proof a::before {
      content: "→ ";
      color: var(--amber);
      margin-right: 4px;
    }

    .proof a:hover {
      text-decoration: underline;
    }

    .rev-scribble {
      position: absolute;
      left: 360px;
      top: -4px;
      transform: rotate(-4deg);
      pointer-events: none;
    }

    .rev-scribble text {
      font-family: "Caveat", cursive;
      font-size: 18px;
      fill: var(--anno);
    }

    /* ===== Pull quote ===== */
    .pullquote {
      margin: 120px auto 80px;
      max-width: 820px;
      padding: 40px 24px;
      background: rgba(10, 62, 66, 0.04);
      text-align: center;
      font-family: "Newsreader", Georgia, serif;
      font-size: clamp(28px, 4.5vw, 40px);
      font-style: italic;
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: -0.3px;
      color: var(--teal);
    }

    .pullquote::before {
      content: open-quote;
      font-size: 1.4em;
      line-height: 0;
      vertical-align: -0.25em;
      margin-right: 0.04em;
      color: var(--amber);
    }

    .pullquote::after {
      content: close-quote;
      color: var(--amber);
    }

    /* ===== Signature + closeout ===== */
    .closeout {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 32px;
      padding-top: 60px;
      position: relative;
    }

    .signature {
      font-family: "Homemade Apple", "Caveat", cursive;
      font-size: 40px;
      color: var(--ink);
      line-height: 1;
    }

    .reg-mark {
      width: 28px;
      height: 28px;
      opacity: 0.7;
    }

    /* ===== Mono stamps in margins ===== */
    .stamp {
      position: absolute;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 1.6px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--stamp);
      border: 1px solid var(--stamp);
      padding: 4px 8px;
      transform: rotate(-3deg);
      opacity: 0.7;
      pointer-events: none;
    }

    /* ===== Custom cursor ===== */
    .cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink);
      pointer-events: none;
      z-index: 800;
      mix-blend-mode: difference;
      transition: width 200ms ease, height 200ms ease, background 200ms ease;
      will-change: transform;
    }

    .cursor--link {
      width: 36px;
      height: 36px;
      background: var(--teal);
      mix-blend-mode: normal;
      opacity: 0.85;
    }

    .cursor--cel {
      width: 24px;
      height: 24px;
      background: var(--amber);
      mix-blend-mode: normal;
    }

    /* ===== Reduced motion ===== */
    @media (prefers-reduced-motion: reduce) {

      .lead__line,
      .character,
      .pulse,
      .anno-updated {
        animation: fadeIn 200ms linear forwards !important;
        transform: none !important;
      }

      .anno-updated__bob,
      .pulse__live-dot,
      .availability__dot {
        animation: none !important;
      }
    }

    /* ===== Tablet ===== */
    @media (max-width: 1024px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 32px;
        min-height: 0;
      }

      .character {
        max-width: 360px;
        margin: 0 auto;
      }

      .canon {
        grid-template-columns: repeat(2, 1fr);
      }

      .anno-updated,
      .kid-drawing,
      .rewire-arrow,
      .rev-scribble,
      .stamp {
        display: none;
      }
    }

    /* ===== Mobile ===== */
    @media (max-width: 640px) {
      .about {
        padding: 40px 24px 60px;
      }

      .timeline {
        grid-template-columns: 1fr;
      }

      .timeline__gutter {
        display: none;
      }

      .timeline__col-head--right {
        text-align: left;
      }

      .row__cell--left,
      .row__cell--right {
        text-align: left;
        padding: 0;
      }

      .row__cell--right {
        padding-left: 24px;
        border-left: 1px solid var(--border);
      }

      .canon {
        grid-template-columns: 1fr;
      }

      .band__title {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState } = React;

    const TOKENS = {
      paper: "#FFF9F0",
      ink: "#1A1A1E",
      teal: "#0A3E42",
      amber: "#FAC775",
      secondary: "#546E71",
      stamp: "#7C2D12",
      anno: "rgba(10,62,66,0.7)",
      border: "rgba(10,62,66,0.15)",
    };

    const LEAD = [
      "Raised by Saturday morning cartoons and Vercel deployment logs.",
    ];

    const DATELINE = {
      stamp: "BOSTON, MAY 18, 2026 — ",
      body: "about · updated weekly by daily driver",
      suffix: " · 4 MIN",
    };

    const PULSE_ITEMS = [
      "4 commits to superuser-pack",
      "1 substack draft",
      "2 pencil-test frames cleaned",
      "currently reading: karpathy on the explanation artifact",
      "updated 08:45 by daily driver",
    ];

    const TIMELINE_ROWS = [
      { age: "age 8", left: "drew first Saturday morning cartoon — a coyote, badly", right: "asked dad to deploy a webpage; it was on Geocities" },
      { age: "age 14", left: "filled six sketchbooks; saved up for first Wacom", right: "shipped the school-play site; learned what 'broken' meant" },
      { age: "age 18", left: "RISD pencil tests; flipbook obsession", right: "comp-sci 101; first stack trace; first deploy" },
      { age: "age 22", left: "first short film; first festival rejection", right: "first PM role; first PRD; first stakeholder loop" },
      { age: "age 26", left: "moved to Procreate; lost the line and chased it back", right: "led platform team; learned to write specs that survive turnover" },
      { age: "age 30", left: "started teaching kids to animate", right: "scaled comms infra to 50M MAU at Disqus" },
      { age: "age 34", left: "back to traditional pencil — the line is everything", right: "agent fleets; daily driver; ship the spec, not the code" },
      { age: "age 36", left: "drawing my own character every week", right: "AI PM — 14 agents from a single config" },
    ];

    const GUTTER_ARROWS = [
      { fromRow: 0, label: "parallel" },
      { fromRow: 3, label: "becomes" },
      { fromRow: 6, label: "parallel" },
    ];

    const CARTOONS = [
      { order: 1, name: "WILE E. COYOTE", year: "1949–", noun: "ANTICIPATION TIMING", body: "the wind-up sells every gag. ship the wind-up before the deliverable.", icon: "coyote" },
      { order: 2, name: "PINKY AND THE BRAIN", year: "1995–98", noun: "CHARACTER VS SCHEME", body: "the team that owns the scheme is not always the team that lands it.", icon: "duo" },
      { order: 3, name: "SPONGEBOB", year: "1999–", noun: "PACING", body: "when in doubt, cut to the close-up. a slow scene needs a closer camera.", icon: "sponge" },
      { order: 4, name: "LOONEY TUNES", year: "1930–", noun: "PHYSICAL COMEDY", body: "the joke is in the timing, not the gag. agents need beats, not just plans.", icon: "bunny" },
      { order: 5, name: "DEXTER'S LABORATORY", year: "1996–2003", noun: "SCOPE CREEP", body: "the experiment that destroys the lab is the one you didn't pre-mortem.", icon: "flask" },
      { order: 6, name: "HEY ARNOLD!", year: "1996–2004", noun: "POV CHARACTER", body: "the city is a character; so is the codebase. write from the place that holds them.", icon: "footy" },
    ];

    const LOAD_BEARING_CEL = 4; // Looney Tunes — gets the "this one rewires you" arrow

    /* ===== Cel pegs SVG ===== */
    function RegistrationPegs() {
      return (
        <svg className="cel__pegs" viewBox="0 0 96 18" aria-hidden="true">
          <circle cx="16" cy="9" r="4" fill="none" stroke={TOKENS.amber} strokeWidth="1.2" />
          <polygon points="40,2 56,2 58,16 38,16" fill="none" stroke={TOKENS.amber} strokeWidth="1.2" />
          <circle cx="80" cy="9" r="4" fill="none" stroke={TOKENS.amber} strokeWidth="1.2" />
          <line x1="48" y1="2" x2="48" y2="16" stroke={TOKENS.amber} strokeWidth="0.8" strokeDasharray="2,2" />
        </svg>
      );
    }

    /* ===== Pencil-test stand-in studies (simple line abstractions, NOT a real study) ===== */
    function CartoonStudy({ kind }) {
      const stroke = "rgba(26,26,30,0.85)";
      const accent = "rgba(124,45,18,0.7)";
      const props = { fill: "none", stroke, strokeWidth: 1.2, strokeLinecap: "round", strokeLinejoin: "round" };
      if (kind === "coyote") {
        return (
          <svg viewBox="0 0 160 160" width="100%" height="100%">
            <path d="M30,120 Q50,80 80,75 Q110,72 120,90 L130,100 L132,114" {...props} />
            <path d="M80,75 Q85,55 92,52" {...props} />
            <path d="M92,52 L99,48 L96,56 Z" {...props} />
            <circle cx="92" cy="62" r="2" fill={stroke} />
            <path d="M120,90 L138,82" {...props} />

    function useReducedMotion() {
      const [reduced, setReduced] = useState(false);
      useEffect(() => {
        const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        setReduced(mq.matches);
        const handler = (e) => setReduced(e.matches);
        mq.addEventListener?.("change", handler);
        return () => mq.removeEventListener?.("change", handler);
      }, []);
      return reduced;
    }

    function Cursor() {
      const ref = useRef(null);
      const reduced = useReducedMotion();
      const [mode, setMode] = useState("default");

      useEffect(() => {
        if (reduced) return;
        const el = ref.current;
        if (!el) return;
        let mx = innerWidth / 2, my = innerHeight / 2;
        let cx = mx, cy = my, raf;
        const move = e => { mx = e.clientX; my = e.clientY; };
        const loop = () => {
          cx += (mx - cx) * 0.18;
          cy += (my - cy) * 0.18;
          el.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
          raf = requestAnimationFrame(loop);
        };
        addEventListener("mousemove", move);
        loop();
        return () => { removeEventListener("mousemove", move); cancelAnimationFrame(raf); };
      }, [reduced]);

      useEffect(() => {
        if (reduced) return;
        const over = e => {
          const t = e.target;
          if (!(t instanceof Element)) return;
          if (t.closest("a")) setMode("link");
          else if (t.closest("[data-cursor-cel]")) setMode("cel");
          else setMode("default");
        };
        document.addEventListener("mouseover", over);
        return () => document.removeEventListener("mouseover", over);
      }, [reduced]);

      if (reduced) return null;
      return <div ref={ref} className={`cursor cursor--${mode}`} aria-hidden="true" />;
    }
